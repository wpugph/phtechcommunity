name: Sync Plugins to Pantheon

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev, test, live, or multidev name)'
        required: true
        default: 'dev'
        type: string
      source_env:
        description: 'Source environment in manifest (dev, test, live)'
        required: true
        default: 'dev'
        type: string
      dry_run:
        description: 'Dry run (show what would be installed without actually installing)'
        required: false
        default: false
        type: boolean

jobs:
  sync-to-pantheon:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Install Terminus
          mkdir -p $HOME/.terminus
          curl -L https://github.com/pantheon-systems/terminus/releases/download/3.5.0/terminus.phar -o /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

          # Install jq
          sudo apt-get update && sudo apt-get install -y jq

      - name: Authenticate with Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$TERMINUS_TOKEN"

      - name: Set connection to SFTP mode
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          TARGET_ENV: ${{ github.event.inputs.environment }}
        run: |
          terminus connection:set "$SITE_NAME.$TARGET_ENV" sftp

      - name: Sync plugins and themes from manifest
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          TARGET_ENV: ${{ github.event.inputs.environment }}
          SOURCE_ENV: ${{ github.event.inputs.source_env }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "🔄 Syncing plugins and themes to Pantheon..."
          echo "Source: bin/manifest.json ($SOURCE_ENV)"
          echo "Target: $SITE_NAME.$TARGET_ENV"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 DRY RUN MODE - No changes will be made"
          fi

          # Wake environment
          terminus env:wake "$SITE_NAME.$TARGET_ENV"

          # Read manifest path (multidev or standard env)
          if [ "$SOURCE_ENV" = "dev" ] || [ "$SOURCE_ENV" = "test" ] || [ "$SOURCE_ENV" = "live" ]; then
            MANIFEST_PATH=".environments.$SOURCE_ENV"
          else
            MANIFEST_PATH=".environments.multidevs.\"$SOURCE_ENV\""
          fi

          # Check if manifest exists
          if ! jq -e "$MANIFEST_PATH" bin/manifest.json > /dev/null 2>&1; then
            echo "❌ Error: Environment '$SOURCE_ENV' not found in manifest"
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Plugin & Theme Sync" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** $SOURCE_ENV (manifest)" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** $SITE_NAME.$TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $([ "$DRY_RUN" = "true" ] && echo "Dry Run" || echo "Live")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get plugins from manifest
          PLUGINS=$(jq -r "$MANIFEST_PATH.plugins | keys[]" bin/manifest.json 2>/dev/null || echo "")

          if [ -n "$PLUGINS" ]; then
            echo "### 🔌 Plugins" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            for PLUGIN in $PLUGINS; do
              VERSION=$(jq -r "$MANIFEST_PATH.plugins.\"$PLUGIN\".version" bin/manifest.json)
              STATUS=$(jq -r "$MANIFEST_PATH.plugins.\"$PLUGIN\".status" bin/manifest.json)

              echo "→ $PLUGIN (v$VERSION, $STATUS)"
              echo "- \`$PLUGIN\` → v$VERSION [$STATUS]" >> $GITHUB_STEP_SUMMARY

              if [ "$DRY_RUN" != "true" ]; then
                # Install/update plugin
                terminus wp "$SITE_NAME.$TARGET_ENV" -- plugin install "$PLUGIN" --version="$VERSION" --force 2>&1 | grep -v "^\[" || echo "  ⚠️ Failed to install $PLUGIN"

                # Set activation status
                if [ "$STATUS" = "active" ]; then
                  terminus wp "$SITE_NAME.$TARGET_ENV" -- plugin activate "$PLUGIN" 2>&1 | grep -v "^\[" || true
                elif [ "$STATUS" = "inactive" ]; then
                  terminus wp "$SITE_NAME.$TARGET_ENV" -- plugin deactivate "$PLUGIN" 2>&1 | grep -v "^\[" || true
                fi
              fi
            done
          else
            echo "ℹ️  No plugins in manifest"
            echo "ℹ️ No plugins found" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎨 Themes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get themes from manifest (exclude custom theme)
          THEMES=$(jq -r "$MANIFEST_PATH.themes | keys[] | select(. != \"phcommunity.tech\")" bin/manifest.json 2>/dev/null || echo "")

          if [ -n "$THEMES" ]; then
            for THEME in $THEMES; do
              VERSION=$(jq -r "$MANIFEST_PATH.themes.\"$THEME\".version" bin/manifest.json)

              echo "→ $THEME (v$VERSION)"
              echo "- \`$THEME\` → v$VERSION" >> $GITHUB_STEP_SUMMARY

              if [ "$DRY_RUN" != "true" ]; then
                terminus wp "$SITE_NAME.$TARGET_ENV" -- theme install "$THEME" --version="$VERSION" --force 2>&1 | grep -v "^\[" || echo "  ⚠️ Failed to install $THEME"
              fi
            done
          else
            echo "ℹ️  No themes in manifest (custom theme excluded)"
            echo "ℹ️ No third-party themes (custom theme excluded)" >> $GITHUB_STEP_SUMMARY
          fi

          # Activate correct theme
          ACTIVE_THEME=$(jq -r "$MANIFEST_PATH.active_theme" bin/manifest.json)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✨ Active Theme" >> $GITHUB_STEP_SUMMARY
          echo "- \`$ACTIVE_THEME\`" >> $GITHUB_STEP_SUMMARY

          if [ -n "$ACTIVE_THEME" ] && [ "$ACTIVE_THEME" != "null" ]; then
            echo "→ Activating theme: $ACTIVE_THEME"

            if [ "$DRY_RUN" != "true" ]; then
              terminus wp "$SITE_NAME.$TARGET_ENV" -- theme activate "$ACTIVE_THEME" 2>&1 | grep -v "^\[" || echo "  ⚠️ Failed to activate $ACTIVE_THEME"
            fi
          fi

      - name: Commit SFTP changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          TARGET_ENV: ${{ github.event.inputs.environment }}
          SOURCE_ENV: ${{ github.event.inputs.source_env }}
        run: |
          # Commit any SFTP changes made
          terminus env:commit "$SITE_NAME.$TARGET_ENV" \
            --message="Sync plugins/themes from manifest ($SOURCE_ENV)" \
            2>&1 || echo "ℹ️  No SFTP changes to commit"

      - name: Switch back to Git mode
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          TARGET_ENV: ${{ github.event.inputs.environment }}
        run: |
          terminus connection:set "$SITE_NAME.$TARGET_ENV" git

      - name: Clear cache
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          TARGET_ENV: ${{ github.event.inputs.environment }}
        run: |
          terminus env:clear-cache "$SITE_NAME.$TARGET_ENV"

      - name: Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "🔍 **Dry run completed** - No changes were made" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Sync completed successfully**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View site](https://${{ github.event.inputs.environment }}-${{ secrets.PANTHEON_SITE_NAME }}.pantheonsite.io)" >> $GITHUB_STEP_SUMMARY
          fi
