name: Sync Pantheon from Manifest

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: 'Source environment in manifest'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - live
          - local
      force_reinstall:
        description: 'Force full reinstall (slow, reinstalls everything)'
        required: false
        type: boolean
        default: false
      commit_changes:
        description: 'Commit changes to Pantheon dev'
        required: false
        type: boolean
        default: false
      deploy_to_test:
        description: 'Deploy to test environment after dev'
        required: false
        type: boolean
        default: false
      deploy_to_live:
        description: 'Deploy to live environment after test'
        required: false
        type: boolean
        default: false
      debug_mode:
        description: 'Enable verbose debug output'
        required: false
        type: boolean
        default: false

jobs:
  sync-pantheon:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            bin/
            .github/
            wp-content/themes/
            wp-content/plugins/
            wp-content/mu-plugins/

      - name: Cache Terminus
        id: cache-terminus
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/terminus
          key: terminus-3.5.0

      - name: Install dependencies
        run: |
          # Install Terminus (use cached if available)
          if [ ! -f /usr/local/bin/terminus ]; then
            echo "Installing Terminus..."
            mkdir -p $HOME/.terminus
            curl -L https://github.com/pantheon-systems/terminus/releases/download/3.5.0/terminus.phar -o /usr/local/bin/terminus
            chmod +x /usr/local/bin/terminus
          else
            echo "Using cached Terminus"
            chmod +x /usr/local/bin/terminus
          fi

          # Install jq (fast, no need to cache)
          sudo apt-get update -qq && sudo apt-get install -y -qq jq >/dev/null 2>&1

      - name: Authenticate with Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$TERMINUS_TOKEN"

      - name: Setup SSH for Pantheon
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$PANTHEON_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host *.drush.in
              StrictHostKeyChecking no
              UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy custom code to Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
        run: |
          echo "Deploying custom themes, plugins, and symlinks to Pantheon dev..."

          # Deploy custom code (themes, plugins, MU plugins) including resolving symlinks
          ./bin/deploy-custom-code-to-pantheon.sh \
            --env dev \
            --commit \
            --skip-auth

      - name: Run sync script
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
          PANTHEON_SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
        run: |
          # Build options from workflow inputs
          OPTIONS="--skip-auth --skip-ssh-setup"  # Already authenticated and SSH setup done
          [ "${{ github.event.inputs.source_env }}" != "dev" ] && OPTIONS="$OPTIONS --source-env ${{ github.event.inputs.source_env }}"
          [ "${{ github.event.inputs.force_reinstall }}" = "true" ] && OPTIONS="$OPTIONS --force"
          [ "${{ github.event.inputs.commit_changes }}" = "true" ] && OPTIONS="$OPTIONS --commit"
          [ "${{ github.event.inputs.deploy_to_test }}" = "true" ] && OPTIONS="$OPTIONS --deploy-test"
          [ "${{ github.event.inputs.deploy_to_live }}" = "true" ] && OPTIONS="$OPTIONS --deploy-live"
          [ "${{ github.event.inputs.debug_mode }}" = "true" ] && OPTIONS="$OPTIONS --debug"

          # Run the reusable sync script
          ./bin/sync-pantheon-from-manifest.sh $OPTIONS

      - name: Update manifest with current Pantheon dev state
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
        run: |
          echo "Capturing current Pantheon dev state to manifest..."

          # Get current WordPress version
          WP_VERSION=$(terminus wp "$SITE_NAME.dev" -- core version 2>/dev/null | grep -oE "^[0-9]+\.[0-9]+(\.[0-9]+)?" | head -1 || echo "unknown")
          echo "WordPress version: $WP_VERSION"

          # Get DB version
          DB_VERSION=$(terminus wp "$SITE_NAME.dev" -- core version --extra 2>/dev/null | grep 'Database' | awk '{print $3}' || echo "unknown")

          # Get PHP version
          PHP_VERSION=$(terminus env:info "$SITE_NAME.dev" --field=php_version 2>/dev/null || echo "unknown")

          # Get plugins list
          terminus wp "$SITE_NAME.dev" -- plugin list --format=json > /tmp/current_plugins_final.json 2>&1

          # Get themes list
          terminus wp "$SITE_NAME.dev" -- theme list --format=json > /tmp/current_themes_final.json 2>&1

          # Get active theme
          ACTIVE_THEME=$(terminus wp "$SITE_NAME.dev" -- theme list --status=active --field=name 2>/dev/null | grep -v "^\[" | head -1 || echo "unknown")

          # Get MU plugins
          MU_PLUGINS_JSON=$(terminus wp "$SITE_NAME.dev" -- eval 'echo json_encode(get_mu_plugins());' 2>/dev/null | grep -v "^\[" | grep "^{" || echo "{}")

          # Check if multisite
          IS_MULTISITE=$(terminus wp "$SITE_NAME.dev" -- eval 'echo is_multisite() ? "true" : "false";' 2>/dev/null | grep -E "^(true|false)" || echo "false")

          # Process plugins JSON
          PLUGINS_OBJ=$(cat /tmp/current_plugins_final.json | jq -r 'if type == "array" then map({(.name): {version: .version, status: .status, update: .update, update_version: .update_version}}) | add // {} else {} end' 2>/dev/null || echo "{}")

          # Process themes JSON
          THEMES_OBJ=$(cat /tmp/current_themes_final.json | jq -r 'if type == "array" then map({(.name): {version: .version, status: .status, update: .update}}) | add // {} else {} end' 2>/dev/null || echo "{}")

          # Validate that we got actual data
          PLUGIN_COUNT=$(echo "$PLUGINS_OBJ" | jq 'length')
          THEME_COUNT=$(echo "$THEMES_OBJ" | jq 'length')
          echo "Captured $PLUGIN_COUNT plugins and $THEME_COUNT themes"

          if [ "$PLUGIN_COUNT" -eq 0 ] && [ "$THEME_COUNT" -eq 0 ]; then
            echo "⚠️  WARNING: No plugins or themes captured. Skipping manifest update."
            exit 0
          fi

          # Process MU plugins
          MU_PLUGINS_OBJ=$(echo "$MU_PLUGINS_JSON" | jq 'to_entries | map({(.key): {version: .value.Version, name: .value.Name}}) | add // {}' 2>/dev/null || echo "{}")

          # Get site UUID
          SITE_UUID=$(terminus site:info "$SITE_NAME" --field=id 2>/dev/null || echo "unknown")

          # Build dev environment data
          DEV_ENV_DATA=$(jq -n \
              --arg site_name "$SITE_NAME" \
              --arg site_id "$SITE_UUID" \
              --arg environment "dev" \
              --arg wp_version "$WP_VERSION" \
              --arg db_version "$DB_VERSION" \
              --arg php_version "$PHP_VERSION" \
              --argjson plugins "$PLUGINS_OBJ" \
              --argjson themes "$THEMES_OBJ" \
              --argjson mu_plugins "$MU_PLUGINS_OBJ" \
              --arg active_theme "$ACTIVE_THEME" \
              --argjson multisite "$IS_MULTISITE" \
              --arg last_updated "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              '{
                  site_name: $site_name,
                  site_id: $site_id,
                  environment: $environment,
                  wordpress: {
                      version: $wp_version,
                      db_version: $db_version
                  },
                  php_version: $php_version,
                  plugins: $plugins,
                  themes: $themes,
                  mu_plugins: $mu_plugins,
                  active_theme: $active_theme,
                  multisite: $multisite,
                  last_updated: $last_updated
              }')

          # Save to manifest.dev.json
          echo "$DEV_ENV_DATA" | jq '.' > bin/manifest.dev.json
          echo "✅ Manifest updated: bin/manifest.dev.json"

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet bin/manifest.dev.json; then
            echo "No changes to manifest"
          else
            git add bin/manifest.dev.json
            git commit -m "Update dev manifest: sync from ${{ github.event.inputs.source_env }} (automated)

            Captured current Pantheon dev state after sync.

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

            git pull --rebase origin ${{ github.ref_name }} || {
              echo "⚠️ Pull failed, attempting to continue..."
            }

            git push
            echo "✅ Manifest committed and pushed"
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Pantheon Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Read summary JSON if it exists
          if [ -f "bin/sync-summary.json" ]; then
            SOURCE_ENV=$(jq -r '.source_env' bin/sync-summary.json)
            TOTAL_ACTIONS=$(jq -r '.planned_actions.total' bin/sync-summary.json)
            TOTAL_CHANGES=$(jq -r '.applied_changes.total' bin/sync-summary.json)
            UNCHANGED=$(jq -r '.planned_actions.unchanged' bin/sync-summary.json)
            COMMITTED=$(jq -r '.deployment.committed' bin/sync-summary.json)
            DEPLOYED_TEST=$(jq -r '.deployment.deployed_to_test' bin/sync-summary.json)
            DEPLOYED_LIVE=$(jq -r '.deployment.deployed_to_live' bin/sync-summary.json)

            echo "**Source:** \`manifest.$SOURCE_ENV.json\`" >> $GITHUB_STEP_SUMMARY
            echo "**Target:** Pantheon dev environment" >> $GITHUB_STEP_SUMMARY
            echo "**Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Deployment status
            echo "### 📦 Deployment Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Action | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Committed to dev | $([ "$COMMITTED" = "true" ] && echo "✅ Yes" || echo "⏭️ Skipped") |" >> $GITHUB_STEP_SUMMARY
            echo "| Deployed to test | $([ "$DEPLOYED_TEST" = "true" ] && echo "✅ Yes" || echo "⏭️ Skipped") |" >> $GITHUB_STEP_SUMMARY
            echo "| Deployed to live | $([ "$DEPLOYED_LIVE" = "true" ] && echo "✅ Yes" || echo "⏭️ Skipped") |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Summary stats
            echo "### 📊 Change Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Actions Planned | $TOTAL_ACTIONS |" >> $GITHUB_STEP_SUMMARY
            echo "| Changes Applied | $TOTAL_CHANGES |" >> $GITHUB_STEP_SUMMARY
            echo "| Already in Sync | $UNCHANGED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Plugin details
            PLUGINS_INSTALLED=$(jq -r '.applied_changes.plugins_installed' bin/sync-summary.json)
            PLUGINS_UPDATED=$(jq -r '.applied_changes.plugins_updated' bin/sync-summary.json)
            PLUGINS_ACTIVATED=$(jq -r '.applied_changes.plugins_activated' bin/sync-summary.json)
            PLUGINS_DEACTIVATED=$(jq -r '.applied_changes.plugins_deactivated' bin/sync-summary.json)
            PLUGINS_UNINSTALLED=$(jq -r '.applied_changes.plugins_uninstalled' bin/sync-summary.json)

            if [ "$PLUGINS_INSTALLED" -gt 0 ] || [ "$PLUGINS_UPDATED" -gt 0 ] || [ "$PLUGINS_ACTIVATED" -gt 0 ] || [ "$PLUGINS_DEACTIVATED" -gt 0 ] || [ "$PLUGINS_UNINSTALLED" -gt 0 ]; then
              echo "### 🔌 Plugin Changes" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              if [ "$PLUGINS_INSTALLED" -gt 0 ] && [ -f "bin/sync-plugins-installed.txt" ]; then
                echo "**✅ Installed ($PLUGINS_INSTALLED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-plugins-installed.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$PLUGINS_UPDATED" -gt 0 ] && [ -f "bin/sync-plugins-updated.txt" ]; then
                echo "**⬆️ Updated ($PLUGINS_UPDATED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-plugins-updated.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$PLUGINS_ACTIVATED" -gt 0 ] && [ -f "bin/sync-plugins-activated.txt" ]; then
                echo "**⚡ Activated ($PLUGINS_ACTIVATED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-plugins-activated.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$PLUGINS_DEACTIVATED" -gt 0 ] && [ -f "bin/sync-plugins-deactivated.txt" ]; then
                echo "**⏸️ Deactivated ($PLUGINS_DEACTIVATED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-plugins-deactivated.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$PLUGINS_UNINSTALLED" -gt 0 ] && [ -f "bin/sync-plugins-uninstalled.txt" ]; then
                echo "**🗑️ Uninstalled ($PLUGINS_UNINSTALLED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-plugins-uninstalled.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            fi

            # Theme details
            THEMES_INSTALLED=$(jq -r '.applied_changes.themes_installed' bin/sync-summary.json)
            THEMES_UPDATED=$(jq -r '.applied_changes.themes_updated' bin/sync-summary.json)

            if [ "$THEMES_INSTALLED" -gt 0 ] || [ "$THEMES_UPDATED" -gt 0 ]; then
              echo "### 🎨 Theme Changes" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              if [ "$THEMES_INSTALLED" -gt 0 ] && [ -f "bin/sync-themes-installed.txt" ]; then
                echo "**✅ Installed ($THEMES_INSTALLED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-themes-installed.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi

              if [ "$THEMES_UPDATED" -gt 0 ] && [ -f "bin/sync-themes-updated.txt" ]; then
                echo "**⬆️ Updated ($THEMES_UPDATED):**" >> $GITHUB_STEP_SUMMARY
                while IFS= read -r line; do
                  echo "- $line" >> $GITHUB_STEP_SUMMARY
                done < bin/sync-themes-updated.txt
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            fi

            # Skipped/Failed plugins
            if [ -f "bin/sync-plugins-skipped.txt" ] && [ -s "bin/sync-plugins-skipped.txt" ]; then
              SKIPPED_COUNT=$(wc -l < bin/sync-plugins-skipped.txt | xargs)
              FAILED_COUNT=$(jq -r '.planned_actions.install' bin/sync-summary.json)
              SUCCESS_COUNT=$(jq -r '.applied_changes.plugins_installed' bin/sync-summary.json)
              ACTUAL_FAILED=$((FAILED_COUNT - SUCCESS_COUNT))

              if [ "$ACTUAL_FAILED" -gt 0 ]; then
                echo "### ⚠️ Failed Installations" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "**❌ Not available in WordPress.org ($ACTUAL_FAILED):**" >> $GITHUB_STEP_SUMMARY
                echo "> These are likely custom plugins that need to be deployed via git" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                head -n $ACTUAL_FAILED bin/sync-plugins-skipped.txt | while IFS='|' read -r slug version status; do
                  echo "- \`$slug\` (v$version)" >> $GITHUB_STEP_SUMMARY
                done
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            fi

            # WordPress version
            WP_CURRENT=$(jq -r '.versions.wordpress.current' bin/sync-summary.json)
            WP_TARGET=$(jq -r '.versions.wordpress.target' bin/sync-summary.json)
            THEME_CURRENT=$(jq -r '.versions.theme.current' bin/sync-summary.json)
            THEME_TARGET=$(jq -r '.versions.theme.target' bin/sync-summary.json)

            echo "### 📌 Version Info" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
            echo "| WordPress | $WP_CURRENT $([ "$WP_CURRENT" != "$WP_TARGET" ] && echo "(target: $WP_TARGET)" || echo "") |" >> $GITHUB_STEP_SUMMARY
            echo "| Active Theme | $THEME_CURRENT $([ "$THEME_CURRENT" != "$THEME_TARGET" ] && echo "(target: $THEME_TARGET)" || echo "") |" >> $GITHUB_STEP_SUMMARY

          else
            echo "⚠️ No summary data available" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by [Sync Pantheon from Manifest workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> $GITHUB_STEP_SUMMARY
