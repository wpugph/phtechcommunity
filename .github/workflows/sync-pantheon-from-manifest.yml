name: Sync Pantheon from Manifest

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: 'Source environment in manifest'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - live
          - local
      force_reinstall:
        description: 'Force full reinstall (slow, reinstalls everything)'
        required: false
        type: boolean
        default: false
      commit_changes:
        description: 'Commit changes to Pantheon dev'
        required: false
        type: boolean
        default: false
      deploy_to_test:
        description: 'Deploy to test environment after dev'
        required: false
        type: boolean
        default: false
      deploy_to_live:
        description: 'Deploy to live environment after test'
        required: false
        type: boolean
        default: false
      debug_mode:
        description: 'Enable verbose debug output'
        required: false
        type: boolean
        default: false

jobs:
  sync-pantheon:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Optimize: don't fetch tags/history
          sparse-checkout: |
            bin/
            .github/

      - name: Cache Terminus
        id: cache-terminus
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/terminus
          key: terminus-3.5.0

      - name: Install dependencies
        run: |
          # Install Terminus (use cached if available)
          if [ ! -f /usr/local/bin/terminus ]; then
            echo "Installing Terminus..."
            mkdir -p $HOME/.terminus
            curl -L https://github.com/pantheon-systems/terminus/releases/download/3.5.0/terminus.phar -o /usr/local/bin/terminus
            chmod +x /usr/local/bin/terminus
          else
            echo "Using cached Terminus"
            chmod +x /usr/local/bin/terminus
          fi

          # Install jq (fast, no need to cache)
          sudo apt-get update -qq && sudo apt-get install -y -qq jq >/dev/null 2>&1

      - name: Authenticate with Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$TERMINUS_TOKEN"

      - name: Setup SSH for Pantheon
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
        run: |
          # Setup SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add SSH private key from secret
          echo "$PANTHEON_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Disable strict host key checking for Pantheon
          cat >> ~/.ssh/config <<EOF
          Host *.drush.in
              StrictHostKeyChecking no
              UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Switch dev to SFTP mode
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
        run: |
          echo "Switching dev environment to SFTP mode..."
          terminus connection:set "$SITE_NAME.dev" sftp || echo "Already in SFTP mode or switch failed"

      - name: Load manifest and exclusions
        id: load_manifest
        run: |
          SITE_NAME="${{ secrets.PANTHEON_SITE_NAME }}"
          SOURCE_ENV="${{ github.event.inputs.source_env }}"
          MANIFEST_FILE="bin/manifest.${SOURCE_ENV}.json"

          echo "site_name=$SITE_NAME" >> $GITHUB_OUTPUT
          echo "source_env=$SOURCE_ENV" >> $GITHUB_OUTPUT
          echo "manifest_file=$MANIFEST_FILE" >> $GITHUB_OUTPUT

          # Check if manifest file exists
          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "❌ ERROR: Manifest file not found: $MANIFEST_FILE"
            echo ""
            echo "Available manifest files:"
            ls -1 bin/manifest.*.json 2>/dev/null || echo "  (none found)"
            echo ""
            exit 1
          fi

          # Load exclusions
          if [ -f "bin/manifest-exclude.txt" ]; then
            EXCLUDED=$(grep -v '^#' bin/manifest-exclude.txt | grep -v '^[[:space:]]*$' | tr '\n' '|' | sed 's/|$//')
            echo "excluded=$EXCLUDED" >> $GITHUB_OUTPUT
          else
            echo "excluded=" >> $GITHUB_OUTPUT
          fi

          # Initialize tracking files
          touch /tmp/changes_made.txt
          touch /tmp/plugins_installed.txt
          touch /tmp/plugins_updated.txt
          touch /tmp/plugins_activated.txt
          touch /tmp/plugins_deactivated.txt
          touch /tmp/plugins_uninstalled.txt
          touch /tmp/themes_installed.txt
          touch /tmp/themes_updated.txt

      - name: Compare current state with manifest
        id: compare
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          SOURCE_ENV: ${{ steps.load_manifest.outputs.source_env }}
          EXCLUDED: ${{ steps.load_manifest.outputs.excluded }}
          FORCE: ${{ github.event.inputs.force_reinstall }}
        run: |
          echo "## 🔍 Comparing Pantheon dev with manifest ($SOURCE_ENV)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Wake dev environment (non-blocking)
          echo "Waking dev environment..."
          terminus env:wake "$SITE_NAME.dev" || true

          # Reduced wait time - terminus commands auto-wait internally
          sleep 2

          # Test WP-CLI connectivity
          echo "Testing WP-CLI connection..."
          if ! terminus wp "$SITE_NAME.dev" -- core version --quiet 2>/dev/null; then
            echo "❌ ERROR: Cannot connect to WordPress via WP-CLI"
            echo "This usually means:"
            echo "  - Environment is not in SFTP mode"
            echo "  - SSH keys are not configured"
            echo "  - WordPress is not installed"
            exit 1
          fi
          echo "✓ WP-CLI connection successful"

          # Get target versions from manifest
          MANIFEST_FILE="${{ steps.load_manifest.outputs.manifest_file }}"
          WP_TARGET=$(jq -r ".wordpress.version // \"unknown\"" "$MANIFEST_FILE")
          THEME_TARGET=$(jq -r ".active_theme // \"unknown\"" "$MANIFEST_FILE")

          # Get current WordPress version and active theme in one go (optimized)
          WP_CURRENT=$(terminus wp "$SITE_NAME.dev" -- core version 2>/dev/null | grep -oE "^[0-9]+\.[0-9]+(\.[0-9]+)?" | head -1 || echo "unknown")
          THEME_CURRENT=$(terminus wp "$SITE_NAME.dev" -- theme list --status=active --field=name 2>/dev/null | grep -v "^\[" | grep -v "^Command:" | head -1 || echo "unknown")

          # Conditional debug output
          if [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            echo "DEBUG: WordPress - Target: $WP_TARGET, Current: $WP_CURRENT"
            echo "DEBUG: Theme - Target: $THEME_TARGET, Current: $THEME_CURRENT"
          fi

          echo "wp_target=$WP_TARGET" >> $GITHUB_OUTPUT
          echo "wp_current=$WP_CURRENT" >> $GITHUB_OUTPUT
          echo "theme_target=$THEME_TARGET" >> $GITHUB_OUTPUT
          echo "theme_current=$THEME_CURRENT" >> $GITHUB_OUTPUT

          # Determine if WP core needs update
          if [ "$FORCE" = "true" ] || [ "$WP_CURRENT" != "$WP_TARGET" ]; then
            echo "wp_action=update" >> $GITHUB_OUTPUT
          else
            echo "wp_action=skip" >> $GITHUB_OUTPUT
          fi

          # Get plugins from manifest and current state
          MANIFEST_FILE="${{ steps.load_manifest.outputs.manifest_file }}"
          jq -r ".plugins | to_entries[] | \"\(.key)|\(.value.version)|\(.value.status)\"" "$MANIFEST_FILE" > /tmp/manifest_plugins.txt

          # Get current plugins from Pantheon dev
          echo "Fetching current plugin list from Pantheon dev..."
          terminus wp "$SITE_NAME.dev" -- plugin list --format=json > /tmp/plugin_raw.txt 2>&1

          # Extract and parse JSON
          # Use jq to parse, handling both array and object responses
          if cat /tmp/plugin_raw.txt | jq -e '. | type' >/dev/null 2>&1; then
            cat /tmp/plugin_raw.txt | jq -r 'if type == "array" then .[] else . end | "\(.name)|\(.version)|\(.status)"' > /tmp/current_plugins.txt 2>/dev/null || echo "" > /tmp/current_plugins.txt
          else
            echo "" > /tmp/current_plugins.txt
          fi

          # Conditional debug output
          if [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            echo ""
            echo "=== DEBUG: Plugin Comparison ==="
            echo "Plugins in manifest ($SOURCE_ENV): $(wc -l < /tmp/manifest_plugins.txt | xargs)"
            echo "Plugins currently in dev: $(wc -l < /tmp/current_plugins.txt | xargs)"
            echo ""
          fi

          if [ ! -s /tmp/current_plugins.txt ]; then
            echo "⚠️ No plugins found in dev via JSON format, trying CSV fallback..."
            # Try CSV format as fallback
            terminus wp "$SITE_NAME.dev" -- plugin list --format=csv 2>&1 | tail -n +2 | awk -F',' '{print $1"|"$4"|"$2}' > /tmp/current_plugins.txt || echo "" > /tmp/current_plugins.txt
            if [ ! -s /tmp/current_plugins.txt ]; then
              echo "❌ ERROR: No plugins found in dev!"
              if [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
                echo "Raw terminus output:"
                cat /tmp/plugin_raw.txt
              fi
              exit 1
            fi
          fi

          if [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            echo "First 5 manifest plugins:"
            head -5 /tmp/manifest_plugins.txt || echo "  (none)"
            echo ""
            echo "First 5 current plugins:"
            head -5 /tmp/current_plugins.txt || echo "  (none)"
            echo "================================"
            echo ""
          fi

          # Sanity check before comparison
          if [ ! -f /tmp/manifest_plugins.txt ] || [ ! -s /tmp/manifest_plugins.txt ]; then
            echo "❌ ERROR: Manifest plugins list is empty for environment '$SOURCE_ENV'!"
            echo ""
            echo "Manifest file: $MANIFEST_FILE"
            count=$(jq -r ".plugins | length" "$MANIFEST_FILE" 2>/dev/null || echo "0")
            echo "Plugins in manifest: $count"
            echo ""
            echo "Available manifest files:"
            ls -1 bin/manifest.*.json 2>/dev/null || echo "  (none found)"
            echo ""
            echo "💡 Tip: Make sure the manifest file has plugins."
            echo "        Run: ./bin/save-local-to-manifest.sh (for local)"
            echo "        Or: ./bin/save-pantheon-to-manifest.sh (for dev/test/live)"
            exit 1
          fi

          if [ ! -f /tmp/current_plugins.txt ] || [ ! -s /tmp/current_plugins.txt ]; then
            echo "⚠️  WARNING: Current plugins list is empty - will treat all as new installs"
          fi

          # Initialize comparison result files
          > /tmp/plugins_to_install.txt
          > /tmp/plugins_to_update.txt
          > /tmp/plugins_to_activate.txt
          > /tmp/plugins_to_deactivate.txt
          > /tmp/plugins_to_uninstall.txt
          > /tmp/plugins_unchanged.txt

          echo "📊 Comparing plugins between manifest and dev..."
          echo ""

          # Compare manifest plugins with current state
          while IFS='|' read -r slug version status; do
            # Skip excluded plugins
            if echo "$EXCLUDED" | grep -qE "(^|\\|)${slug}(\\||$)"; then
              continue
            fi

            current_line=$(grep "^${slug}|" /tmp/current_plugins.txt 2>/dev/null || echo "")

            if [ -z "$current_line" ]; then
              # Plugin not installed
              echo "${slug}|${version}|${status}" >> /tmp/plugins_to_install.txt
            else
              current_version=$(echo "$current_line" | cut -d'|' -f2)
              current_status=$(echo "$current_line" | cut -d'|' -f3)

              # Check if version AND status match
              if [ "$current_version" = "$version" ] && [ "$current_status" = "$status" ] && [ "$FORCE" != "true" ]; then
                # Perfect match - no action needed
                echo "${slug}|${version}|${status}" >> /tmp/plugins_unchanged.txt
              elif [ "$FORCE" = "true" ] || [ "$current_version" != "$version" ]; then
                # Version mismatch - needs update/downgrade
                echo "${slug}|${version}|${current_version}|${status}" >> /tmp/plugins_to_update.txt
              elif [ "$status" = "active" ] && [ "$current_status" != "active" ]; then
                # Only activation status differs
                echo "$slug" >> /tmp/plugins_to_activate.txt
              elif [ "$status" = "inactive" ] && [ "$current_status" = "active" ]; then
                # Only activation status differs
                echo "$slug" >> /tmp/plugins_to_deactivate.txt
              fi
            fi
          done < /tmp/manifest_plugins.txt

          # Check for plugins in dev that are NOT in manifest (need to uninstall)
          while IFS='|' read -r slug version status; do
            # Skip excluded plugins
            if echo "$EXCLUDED" | grep -qE "(^|\\|)${slug}(\\||$)"; then
              continue
            fi

            # Check if plugin exists in manifest
            if ! grep -q "^${slug}|" /tmp/manifest_plugins.txt; then
              echo "${slug}|${version}" >> /tmp/plugins_to_uninstall.txt
            fi
          done < /tmp/current_plugins.txt

          # Get themes from manifest and current state
          MANIFEST_FILE="${{ steps.load_manifest.outputs.manifest_file }}"
          jq -r ".themes | to_entries[] | \"\(.key)|\(.value.version)\"" "$MANIFEST_FILE" > /tmp/manifest_themes.txt || echo "" > /tmp/manifest_themes.txt

          # Get current themes from Pantheon dev
          terminus wp "$SITE_NAME.dev" -- theme list --format=json > /tmp/theme_raw.txt 2>&1

          # Extract and parse JSON
          cat /tmp/theme_raw.txt | jq -r '.[]? | "\(.name)|\(.version)"' > /tmp/current_themes.txt 2>/dev/null || echo "" > /tmp/current_themes.txt

          # Debug: show what we got
          echo "Themes in manifest: $(wc -l < /tmp/manifest_themes.txt)"
          echo "Themes in dev: $(wc -l < /tmp/current_themes.txt)"
          if [ ! -s /tmp/current_themes.txt ]; then
            echo "⚠️  Warning: No themes found in dev. Raw output:"
            cat /tmp/theme_raw.txt | head -20
          else
            echo "Sample current themes:"
            head -5 /tmp/current_themes.txt
          fi

          # Compare themes
          > /tmp/themes_to_install.txt
          > /tmp/themes_to_update.txt

          while IFS='|' read -r slug version; do
            # Skip excluded themes
            if echo "$EXCLUDED" | grep -qE "(^|\\|)${slug}(\\||$)"; then
              continue
            fi

            current_line=$(grep "^${slug}|" /tmp/current_themes.txt || echo "")

            if [ -z "$current_line" ]; then
              # Theme not installed
              echo "${slug}|${version}" >> /tmp/themes_to_install.txt
            else
              current_version=$(echo "$current_line" | cut -d'|' -f2)

              if [ "$FORCE" = "true" ] || [ "$current_version" != "$version" ]; then
                echo "${slug}|${version}|${current_version}" >> /tmp/themes_to_update.txt
              fi
            fi
          done < /tmp/manifest_themes.txt

          # Count all actions
          INSTALL_COUNT=$(wc -l < /tmp/plugins_to_install.txt | xargs)
          UPDATE_COUNT=$(wc -l < /tmp/plugins_to_update.txt | xargs)
          ACTIVATE_COUNT=$(wc -l < /tmp/plugins_to_activate.txt | xargs)
          DEACTIVATE_COUNT=$(wc -l < /tmp/plugins_to_deactivate.txt | xargs)
          UNINSTALL_COUNT=$(wc -l < /tmp/plugins_to_uninstall.txt | xargs)
          UNCHANGED_COUNT=$(wc -l < /tmp/plugins_unchanged.txt | xargs)
          THEME_INSTALL_COUNT=$(wc -l < /tmp/themes_to_install.txt | xargs)
          THEME_UPDATE_COUNT=$(wc -l < /tmp/themes_to_update.txt | xargs)

          # Summary of comparison
          echo ""
          echo "╔═══════════════════════════════════════════╗"
          echo "║  Plugin Comparison Summary                ║"
          echo "╚═══════════════════════════════════════════╝"
          echo ""
          echo "✓ Unchanged (already match):     $UNCHANGED_COUNT"
          echo "↓ Install (not present):         $INSTALL_COUNT"
          echo "↑ Update/Downgrade (version):    $UPDATE_COUNT"
          echo "⚡ Activate (inactive):           $ACTIVATE_COUNT"
          echo "⚠ Deactivate (active):           $DEACTIVATE_COUNT"
          echo "✗ Uninstall (not in manifest):   $UNINSTALL_COUNT"
          echo ""

          # Show details only if there are changes
          if [ "$UPDATE_COUNT" -gt 0 ] && [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            echo "=== Plugins to Update ==="
            cat /tmp/plugins_to_update.txt
            echo ""
          fi
          if [ "$INSTALL_COUNT" -gt 0 ] && [ "${{ github.event.inputs.debug_mode }}" = "true" ]; then
            echo "=== Plugins to Install ==="
            cat /tmp/plugins_to_install.txt
            echo ""
          fi
          if [ "$UNINSTALL_COUNT" -gt 0 ]; then
            echo "⚠️  Plugins to be REMOVED:"
            cat /tmp/plugins_to_uninstall.txt
            echo ""
          fi

          echo "plugins_install_count=$INSTALL_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_update_count=$UPDATE_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_activate_count=$ACTIVATE_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_deactivate_count=$DEACTIVATE_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_uninstall_count=$UNINSTALL_COUNT" >> $GITHUB_OUTPUT
          echo "themes_install_count=$THEME_INSTALL_COUNT" >> $GITHUB_OUTPUT
          echo "themes_update_count=$THEME_UPDATE_COUNT" >> $GITHUB_OUTPUT

          # Calculate total actions
          TOTAL_ACTIONS=0
          [ "$WP_CURRENT" != "$WP_TARGET" ] && TOTAL_ACTIONS=$((TOTAL_ACTIONS + 1))
          TOTAL_ACTIONS=$((TOTAL_ACTIONS + INSTALL_COUNT + UPDATE_COUNT + ACTIVATE_COUNT + DEACTIVATE_COUNT + UNINSTALL_COUNT + THEME_INSTALL_COUNT + THEME_UPDATE_COUNT))

          echo "total_actions=$TOTAL_ACTIONS" >> $GITHUB_OUTPUT
          echo "unchanged_count=$UNCHANGED_COUNT" >> $GITHUB_OUTPUT

          # Check if anything needs to be done
          if [ "$TOTAL_ACTIONS" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo ""
            echo "╔═══════════════════════════════════════════╗"
            echo "║  ✅ Everything is already in sync!        ║"
            echo "╚═══════════════════════════════════════════╝"
            echo ""
            echo "No changes needed. Dev environment matches the manifest perfectly."
            echo ""
            echo "📊 Summary:"
            echo "  - Plugins in sync: $UNCHANGED_COUNT"
            echo "  - WordPress: $WP_CURRENT ✓"
            echo "  - Active theme: $THEME_CURRENT ✓"
            echo ""

            # Write success summary to GitHub
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ Already in Sync!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No changes needed. The dev environment perfectly matches the **$SOURCE_ENV** manifest." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Plugins in sync: $UNCHANGED_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ WordPress version: $WP_CURRENT" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Active theme: $THEME_CURRENT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo ""
            echo "📋 Proceeding with $TOTAL_ACTIONS actions..."
            echo ""
          fi

          # Write summary
          echo "**Source:** $SOURCE_ENV environment from manifest" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $([ "$FORCE" = "true" ] && echo "Force reinstall (slow)" || echo "Smart sync (fast)")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### WordPress Core" >> $GITHUB_STEP_SUMMARY
          if [ "$WP_CURRENT" != "$WP_TARGET" ]; then
            echo "- 🔄 **Version mismatch**: $WP_CURRENT → $WP_TARGET (will update)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ Up to date: $WP_TARGET" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Plugins" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Unchanged** (already match): **$UNCHANGED_COUNT**" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Install: $INSTALL_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Update/Downgrade: $UPDATE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ Activate: $ACTIVATE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- ⏸️ Deactivate: $DEACTIVATE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- 🗑️ Uninstall (not in manifest): $UNINSTALL_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total changes needed:** $((INSTALL_COUNT + UPDATE_COUNT + ACTIVATE_COUNT + DEACTIVATE_COUNT + UNINSTALL_COUNT))" >> $GITHUB_STEP_SUMMARY

          # Show detailed version mismatches for plugins
          if [ "$UPDATE_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Plugin version mismatches (will be updated/downgraded):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version current_version status; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: $current_version → **$version**" >> $GITHUB_STEP_SUMMARY
            done < /tmp/plugins_to_update.txt
          fi

          if [ "$INSTALL_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Plugins to install (not currently installed):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version status; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: **$version** (new)" >> $GITHUB_STEP_SUMMARY
            done < /tmp/plugins_to_install.txt
          fi

          if [ "$UNINSTALL_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Plugins to uninstall (not in manifest):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: $version (will be removed)" >> $GITHUB_STEP_SUMMARY
            done < /tmp/plugins_to_uninstall.txt
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Themes" >> $GITHUB_STEP_SUMMARY
          echo "- Install: $THEME_INSTALL_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Update (version mismatch): $THEME_UPDATE_COUNT" >> $GITHUB_STEP_SUMMARY

          # Show detailed version mismatches for themes
          if [ "$THEME_UPDATE_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Theme version mismatches (will be updated):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version current_version; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: $current_version → **$version**" >> $GITHUB_STEP_SUMMARY
            done < /tmp/themes_to_update.txt
          fi

          if [ "$THEME_INSTALL_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Themes to install (not currently installed):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: **$version** (new)" >> $GITHUB_STEP_SUMMARY
            done < /tmp/themes_to_install.txt
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$THEME_CURRENT" != "$THEME_TARGET" ]; then
            echo "**Active theme change**: $THEME_CURRENT → **$THEME_TARGET** (will activate)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Active theme**: ✅ $THEME_TARGET (no change)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Total actions needed:** $TOTAL_ACTIONS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Update WordPress Core
        if: steps.compare.outputs.has_changes == 'true' && steps.compare.outputs.wp_action == 'update'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          WP_TARGET: ${{ steps.compare.outputs.wp_target }}
          WP_CURRENT: ${{ steps.compare.outputs.wp_current }}
        run: |
          echo "Updating WordPress from $WP_CURRENT to $WP_TARGET..."

          if terminus wp "$SITE_NAME.dev" -- core update --version="$WP_TARGET" || \
             terminus wp "$SITE_NAME.dev" -- core download --version="$WP_TARGET" --force; then
            echo "✅ WordPress updated: $WP_CURRENT → $WP_TARGET"
            echo "WordPress: $WP_CURRENT → $WP_TARGET" > /tmp/changes_made.txt
          else
            echo "❌ WordPress update failed"
            touch /tmp/changes_made.txt
          fi

      - name: Install new plugins
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.plugins_install_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Installing ${{ steps.compare.outputs.plugins_install_count }} plugins..."
          > /tmp/plugins_installed.txt
          COUNTER=0
          TOTAL=${{ steps.compare.outputs.plugins_install_count }}
          while IFS='|' read -r slug version status; do
            [ -z "$slug" ] && continue
            COUNTER=$((COUNTER + 1))
            echo "[$COUNTER/$TOTAL] Installing $slug $version..."

            if terminus wp "$SITE_NAME.dev" -- plugin install "$slug" --version="$version" --force </dev/null 2>/dev/null; then
              echo "$slug $version" >> /tmp/plugins_installed.txt
              [ "$status" = "active" ] && terminus wp "$SITE_NAME.dev" -- plugin activate "$slug" </dev/null 2>/dev/null || true
              echo "  ✅ Success"
            else
              echo "  ❌ Failed"
            fi
          done < /tmp/plugins_to_install.txt
          echo ""
          echo "Total: $(wc -l < /tmp/plugins_installed.txt | xargs)/$TOTAL installed successfully"

      - name: Update existing plugins
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.plugins_update_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode }}
        run: |
          echo "Updating/downgrading ${{ steps.compare.outputs.plugins_update_count }} plugins..."

          if [ "$DEBUG_MODE" = "true" ]; then
            echo ""
            echo "=== DEBUG: Update Step Starting ==="
            echo "File contents:"
            cat /tmp/plugins_to_update.txt
            echo "================================"
            echo ""
          fi

          > /tmp/plugins_updated.txt
          COUNTER=0
          while IFS='|' read -r slug version current_version status; do
            [ -z "$slug" ] && continue

            COUNTER=$((COUNTER + 1))
            echo "[$COUNTER/${{ steps.compare.outputs.plugins_update_count }}] $slug: $current_version → $version"

            # For version changes (upgrade or downgrade), we use install with --force and specific version
            if terminus wp "$SITE_NAME.dev" -- plugin install "$slug" --version="$version" --force </dev/null 2>/dev/null; then
              echo "$slug: $current_version → $version" >> /tmp/plugins_updated.txt
              # Apply activation status from manifest
              if [ "$status" = "active" ]; then
                terminus wp "$SITE_NAME.dev" -- plugin activate "$slug" </dev/null 2>/dev/null || true
              elif [ "$status" = "inactive" ]; then
                terminus wp "$SITE_NAME.dev" -- plugin deactivate "$slug" </dev/null 2>/dev/null || true
              fi
              echo "  ✅ Success"
            else
              echo "  ❌ Failed"
            fi
          done < /tmp/plugins_to_update.txt

          echo ""
          echo "Total: $COUNTER processed, $(wc -l < /tmp/plugins_updated.txt | xargs) succeeded"

      - name: Activate plugins
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.plugins_activate_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Activating ${{ steps.compare.outputs.plugins_activate_count }} plugins..."

          > /tmp/plugins_activated.txt
          COUNTER=0
          TOTAL=${{ steps.compare.outputs.plugins_activate_count }}
          while read -r slug; do
            [ -z "$slug" ] && continue
            COUNTER=$((COUNTER + 1))
            echo "[$COUNTER/$TOTAL] Activating $slug..."
            if terminus wp "$SITE_NAME.dev" -- plugin activate "$slug" </dev/null 2>/dev/null; then
              echo "$slug" >> /tmp/plugins_activated.txt
              echo "  ✅ Success"
            else
              echo "  ❌ Failed"
            fi
          done < /tmp/plugins_to_activate.txt
          echo ""
          echo "Total: $(wc -l < /tmp/plugins_activated.txt | xargs)/$TOTAL activated"

      - name: Deactivate plugins
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.plugins_deactivate_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Deactivating ${{ steps.compare.outputs.plugins_deactivate_count }} plugins..."

          > /tmp/plugins_deactivated.txt
          COUNTER=0
          TOTAL=${{ steps.compare.outputs.plugins_deactivate_count }}
          while read -r slug; do
            [ -z "$slug" ] && continue
            COUNTER=$((COUNTER + 1))
            echo "[$COUNTER/$TOTAL] Deactivating $slug..."
            if terminus wp "$SITE_NAME.dev" -- plugin deactivate "$slug" </dev/null 2>/dev/null; then
              echo "$slug" >> /tmp/plugins_deactivated.txt
              echo "  ✅ Success"
            else
              echo "  ❌ Failed"
            fi
          done < /tmp/plugins_to_deactivate.txt
          echo ""
          echo "Total: $(wc -l < /tmp/plugins_deactivated.txt | xargs)/$TOTAL deactivated"

      - name: Uninstall plugins not in manifest
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.plugins_uninstall_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Uninstalling ${{ steps.compare.outputs.plugins_uninstall_count }} plugins not in manifest..."

          > /tmp/plugins_uninstalled.txt
          COUNTER=0
          TOTAL=${{ steps.compare.outputs.plugins_uninstall_count }}
          while IFS='|' read -r slug version; do
            [ -z "$slug" ] && continue
            COUNTER=$((COUNTER + 1))
            echo "[$COUNTER/$TOTAL] Uninstalling $slug $version..."
            # Deactivate first if active, then uninstall
            terminus wp "$SITE_NAME.dev" -- plugin deactivate "$slug" </dev/null 2>/dev/null || true
            if terminus wp "$SITE_NAME.dev" -- plugin uninstall "$slug" --deactivate </dev/null 2>/dev/null; then
              echo "$slug $version" >> /tmp/plugins_uninstalled.txt
              echo "  ✅ Success"
            else
              echo "  ❌ Failed"
            fi
          done < /tmp/plugins_to_uninstall.txt
          echo ""
          echo "Total: $(wc -l < /tmp/plugins_uninstalled.txt | xargs)/$TOTAL uninstalled"

      - name: Install new themes
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.themes_install_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Installing ${{ steps.compare.outputs.themes_install_count }} themes..."
          > /tmp/themes_installed.txt
          while IFS='|' read -r slug version; do
            [ -z "$slug" ] && continue
            echo "  Installing ${slug} ${version}..."
            if terminus wp "$SITE_NAME.dev" -- theme install "$slug" --version="$version" </dev/null; then
              echo "$slug $version" >> /tmp/themes_installed.txt
              echo "  ✅ Installed: $slug $version"
            else
              echo "  ❌ Failed to install $slug"
            fi
          done < /tmp/themes_to_install.txt
          echo "Total installed: $(wc -l < /tmp/themes_installed.txt | xargs)"

      - name: Update existing themes
        if: steps.compare.outputs.has_changes == 'true' && fromJSON(steps.compare.outputs.themes_update_count) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Updating ${{ steps.compare.outputs.themes_update_count }} themes..."
          > /tmp/themes_updated.txt
          while IFS='|' read -r slug version current_version; do
            [ -z "$slug" ] && continue
            echo "  Updating ${slug}: ${current_version} → ${version}..."
            if terminus wp "$SITE_NAME.dev" -- theme update "$slug" --version="$version" </dev/null || \
               terminus wp "$SITE_NAME.dev" -- theme install "$slug" --version="$version" --force </dev/null; then
              echo "$slug: $current_version → $version" >> /tmp/themes_updated.txt
              echo "  ✅ Updated: $slug $current_version → $version"
            else
              echo "  ❌ Failed to update $slug"
            fi
          done < /tmp/themes_to_update.txt
          echo "Total updated: $(wc -l < /tmp/themes_updated.txt | xargs)"

      - name: Activate theme
        if: steps.compare.outputs.has_changes == 'true' && steps.compare.outputs.theme_current != steps.compare.outputs.theme_target
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          THEME_TARGET: ${{ steps.compare.outputs.theme_target }}
        run: |
          echo "Activating theme: $THEME_TARGET"
          terminus wp "$SITE_NAME.dev" -- theme activate "$THEME_TARGET" </dev/null || echo "⚠️ Could not activate theme"

      - name: Commit changes to Pantheon dev
        if: github.event.inputs.commit_changes == 'true' && fromJSON(steps.compare.outputs.total_actions) > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          SOURCE_ENV: ${{ steps.load_manifest.outputs.source_env }}
        run: |
          echo "Building commit message with changes..."

          # Build detailed commit message
          cat > /tmp/commit_message.txt <<EOF
          Sync from manifest ($SOURCE_ENV) via GitHub Actions

          EOF

          # Add WordPress core changes
          if [ -f /tmp/changes_made.txt ]; then
            cat /tmp/changes_made.txt >> /tmp/commit_message.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin installations
          if [ -f /tmp/plugins_installed.txt ] && [ -s /tmp/plugins_installed.txt ]; then
            echo "Plugins installed:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_installed.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin updates
          if [ -f /tmp/plugins_updated.txt ] && [ -s /tmp/plugins_updated.txt ]; then
            echo "Plugins updated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_updated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add theme installations
          if [ -f /tmp/themes_installed.txt ] && [ -s /tmp/themes_installed.txt ]; then
            echo "Themes installed:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/themes_installed.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add theme updates
          if [ -f /tmp/themes_updated.txt ] && [ -s /tmp/themes_updated.txt ]; then
            echo "Themes updated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/themes_updated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin activations
          if [ -f /tmp/plugins_activated.txt ] && [ -s /tmp/plugins_activated.txt ]; then
            echo "Plugins activated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_activated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin deactivations
          if [ -f /tmp/plugins_deactivated.txt ] && [ -s /tmp/plugins_deactivated.txt ]; then
            echo "Plugins deactivated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_deactivated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin uninstalls
          if [ -f /tmp/plugins_uninstalled.txt ] && [ -s /tmp/plugins_uninstalled.txt ]; then
            echo "Plugins uninstalled (not in manifest):" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_uninstalled.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Show commit message
          echo "Commit message:"
          cat /tmp/commit_message.txt

          # Commit with detailed message
          terminus env:commit "$SITE_NAME.dev" --message="$(cat /tmp/commit_message.txt)" || echo "⚠️ No changes to commit or commit failed"

      - name: Update manifest with current Pantheon dev state
        if: steps.compare.outputs.has_changes == 'true'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Capturing current Pantheon dev state to manifest..."
          echo ""
          echo "NOTE: This will update bin/manifest.dev.json"
          echo ""

          # Get current WordPress version
          WP_VERSION=$(terminus wp "$SITE_NAME.dev" -- core version 2>/dev/null | grep -oE "^[0-9]+\.[0-9]+(\.[0-9]+)?" | head -1 || echo "unknown")
          echo "WordPress version: $WP_VERSION"

          # Get DB version
          DB_VERSION=$(terminus wp "$SITE_NAME.dev" -- core version --extra 2>/dev/null | grep 'Database' | awk '{print $3}' || echo "unknown")

          # Get PHP version
          PHP_VERSION=$(terminus env:info "$SITE_NAME.dev" --field=php_version 2>/dev/null || echo "unknown")

          # Get plugins list
          terminus wp "$SITE_NAME.dev" -- plugin list --format=json > /tmp/current_plugins_final.json 2>&1

          # Get themes list
          terminus wp "$SITE_NAME.dev" -- theme list --format=json > /tmp/current_themes_final.json 2>&1

          # Get active theme
          ACTIVE_THEME=$(terminus wp "$SITE_NAME.dev" -- theme list --status=active --field=name 2>/dev/null | grep -v "^\[" | head -1 || echo "unknown")

          # Get MU plugins
          MU_PLUGINS_JSON=$(terminus wp "$SITE_NAME.dev" -- eval 'echo json_encode(get_mu_plugins());' 2>/dev/null | grep -v "^\[" | grep "^{" || echo "{}")

          # Check if multisite
          IS_MULTISITE=$(terminus wp "$SITE_NAME.dev" -- eval 'echo is_multisite() ? "true" : "false";' 2>/dev/null | grep -E "^(true|false)" || echo "false")

          # Process plugins JSON
          PLUGINS_OBJ=$(cat /tmp/current_plugins_final.json | jq -r 'if type == "array" then map({(.name): {version: .version, status: .status, update: .update, update_version: .update_version}}) | add // {} else {} end' 2>/dev/null || echo "{}")

          # Process themes JSON
          THEMES_OBJ=$(cat /tmp/current_themes_final.json | jq -r 'if type == "array" then map({(.name): {version: .version, status: .status, update: .update}}) | add // {} else {} end' 2>/dev/null || echo "{}")

          # Validate that we got actual data
          PLUGIN_COUNT=$(echo "$PLUGINS_OBJ" | jq 'length')
          THEME_COUNT=$(echo "$THEMES_OBJ" | jq 'length')
          echo "Captured $PLUGIN_COUNT plugins and $THEME_COUNT themes"

          if [ "$PLUGIN_COUNT" -eq 0 ] && [ "$THEME_COUNT" -eq 0 ]; then
            echo "⚠️  WARNING: No plugins or themes captured. This might indicate a parsing error."
            echo "Skipping manifest update to avoid overwriting with empty data."
            exit 0
          fi

          # Process MU plugins
          MU_PLUGINS_OBJ=$(echo "$MU_PLUGINS_JSON" | jq 'to_entries | map({(.key): {version: .value.Version, name: .value.Name}}) | add // {}' 2>/dev/null || echo "{}")

          # Get site UUID
          SITE_UUID=$(terminus site:info "$SITE_NAME" --field=id 2>/dev/null || echo "unknown")

          # Build dev environment data
          DEV_ENV_DATA=$(jq -n \
              --arg site_name "$SITE_NAME" \
              --arg site_id "$SITE_UUID" \
              --arg environment "dev" \
              --arg wp_version "$WP_VERSION" \
              --arg db_version "$DB_VERSION" \
              --arg php_version "$PHP_VERSION" \
              --argjson plugins "$PLUGINS_OBJ" \
              --argjson themes "$THEMES_OBJ" \
              --argjson mu_plugins "$MU_PLUGINS_OBJ" \
              --arg active_theme "$ACTIVE_THEME" \
              --argjson multisite "$IS_MULTISITE" \
              --arg last_updated "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              '{
                  site_name: $site_name,
                  site_id: $site_id,
                  environment: $environment,
                  wordpress: {
                      version: $wp_version,
                      db_version: $db_version
                  },
                  php_version: $php_version,
                  plugins: $plugins,
                  themes: $themes,
                  mu_plugins: $mu_plugins,
                  active_theme: $active_theme,
                  multisite: $multisite,
                  last_updated: $last_updated
              }')

          # Save to manifest.dev.json
          echo "$DEV_ENV_DATA" | jq '.' > bin/manifest.dev.json

          echo "✅ Manifest updated: bin/manifest.dev.json"

      - name: Commit updated manifest
        if: steps.compare.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet bin/manifest.dev.json; then
            echo "No changes to manifest"
          else
            git add bin/manifest.dev.json
            git commit -m "Update dev manifest: sync from ${{ steps.load_manifest.outputs.source_env }} (automated)

            Captured current Pantheon dev state after sync.

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

            # Pull with rebase to avoid conflicts if remote has changes
            git pull --rebase origin ${{ github.ref_name }} || {
              echo "⚠️ Pull failed, attempting to continue..."
            }

            git push
            echo "✅ Manifest committed and pushed"
          fi

      - name: Switch dev back to Git mode
        if: always()
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Switching dev environment back to Git mode..."
          terminus connection:set "$SITE_NAME.dev" git || echo "⚠️ Could not switch to Git mode"

      - name: Clear cache
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          terminus env:clear-cache "$SITE_NAME.dev"

      - name: Deploy to test
        if: github.event.inputs.deploy_to_test == 'true'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Deploying to test environment..."
          terminus env:deploy "$SITE_NAME.test" --sync-content --note="Deployed from manifest sync via GitHub Actions" || echo "⚠️ Deploy to test failed"
          terminus env:clear-cache "$SITE_NAME.test"

      - name: Deploy to live
        if: github.event.inputs.deploy_to_live == 'true' && github.event.inputs.deploy_to_test == 'true'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Deploying to live environment..."
          terminus env:deploy "$SITE_NAME.live" --note="Deployed from manifest sync via GitHub Actions" || echo "⚠️ Deploy to live failed"
          terminus env:clear-cache "$SITE_NAME.live"

      - name: Final summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count successful changes
          WP_CHANGED=0
          PLUGINS_INSTALLED=0
          PLUGINS_UPDATED=0
          PLUGINS_ACTIVATED=0
          PLUGINS_DEACTIVATED=0
          PLUGINS_UNINSTALLED=0
          THEMES_INSTALLED=0
          THEMES_UPDATED=0

          [ -f /tmp/changes_made.txt ] && [ -s /tmp/changes_made.txt ] && WP_CHANGED=1
          [ -f /tmp/plugins_installed.txt ] && PLUGINS_INSTALLED=$(wc -l < /tmp/plugins_installed.txt | xargs)
          [ -f /tmp/plugins_updated.txt ] && PLUGINS_UPDATED=$(wc -l < /tmp/plugins_updated.txt | xargs)
          [ -f /tmp/plugins_activated.txt ] && PLUGINS_ACTIVATED=$(wc -l < /tmp/plugins_activated.txt | xargs)
          [ -f /tmp/plugins_deactivated.txt ] && PLUGINS_DEACTIVATED=$(wc -l < /tmp/plugins_deactivated.txt | xargs)
          [ -f /tmp/plugins_uninstalled.txt ] && PLUGINS_UNINSTALLED=$(wc -l < /tmp/plugins_uninstalled.txt | xargs)
          [ -f /tmp/themes_installed.txt ] && THEMES_INSTALLED=$(wc -l < /tmp/themes_installed.txt | xargs)
          [ -f /tmp/themes_updated.txt ] && THEMES_UPDATED=$(wc -l < /tmp/themes_updated.txt | xargs)

          TOTAL_CHANGES=$((WP_CHANGED + PLUGINS_INSTALLED + PLUGINS_UPDATED + PLUGINS_ACTIVATED + PLUGINS_DEACTIVATED + PLUGINS_UNINSTALLED + THEMES_INSTALLED + THEMES_UPDATED))

          echo "**Actions planned:** ${{ steps.compare.outputs.total_actions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes applied:** $TOTAL_CHANGES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show what was actually changed
          if [ "$TOTAL_CHANGES" -gt 0 ]; then
            echo "### 🔄 Changes Applied" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # WordPress Core
            if [ -f /tmp/changes_made.txt ] && [ -s /tmp/changes_made.txt ]; then
              echo "**WordPress Core:**" >> $GITHUB_STEP_SUMMARY
              cat /tmp/changes_made.txt | sed 's/^/- ✅ /' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins installed
            if [ "$PLUGINS_INSTALLED" -gt 0 ]; then
              echo "**Plugins Installed ($PLUGINS_INSTALLED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_installed.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins updated
            if [ "$PLUGINS_UPDATED" -gt 0 ]; then
              echo "**Plugins Updated ($PLUGINS_UPDATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_updated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Themes installed
            if [ "$THEMES_INSTALLED" -gt 0 ]; then
              echo "**Themes Installed ($THEMES_INSTALLED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/themes_installed.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Themes updated
            if [ "$THEMES_UPDATED" -gt 0 ]; then
              echo "**Themes Updated ($THEMES_UPDATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/themes_updated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins activated
            if [ "$PLUGINS_ACTIVATED" -gt 0 ]; then
              echo "**Plugins Activated ($PLUGINS_ACTIVATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_activated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins deactivated
            if [ "$PLUGINS_DEACTIVATED" -gt 0 ]; then
              echo "**Plugins Deactivated ($PLUGINS_DEACTIVATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_deactivated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins uninstalled
            if [ "$PLUGINS_UNINSTALLED" -gt 0 ]; then
              echo "**Plugins Uninstalled ($PLUGINS_UNINSTALLED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- 🗑️ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_uninstalled.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ **No changes applied** - Either everything was already up to date or all updates failed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Committed to dev:** ${{ github.event.inputs.commit_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to test:** ${{ github.event.inputs.deploy_to_test }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to live:** ${{ github.event.inputs.deploy_to_live }}" >> $GITHUB_STEP_SUMMARY
