name: Sync Pantheon from Manifest

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: 'Source environment in manifest'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - live
          - local
      force_reinstall:
        description: 'Force full reinstall (slow, reinstalls everything)'
        required: false
        type: boolean
        default: false
      commit_changes:
        description: 'Commit changes to Pantheon dev'
        required: false
        type: boolean
        default: false
      deploy_to_test:
        description: 'Deploy to test environment after dev'
        required: false
        type: boolean
        default: false
      deploy_to_live:
        description: 'Deploy to live environment after test'
        required: false
        type: boolean
        default: false

jobs:
  sync-pantheon:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          # Install Terminus
          mkdir -p $HOME/.terminus
          curl -L https://github.com/pantheon-systems/terminus/releases/download/3.5.0/terminus.phar -o /usr/local/bin/terminus
          chmod +x /usr/local/bin/terminus

          # Install jq
          sudo apt-get update && sudo apt-get install -y jq

      - name: Authenticate with Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$TERMINUS_TOKEN"

      - name: Setup SSH for Pantheon
        env:
          PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
        run: |
          # Setup SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add SSH private key from secret
          echo "$PANTHEON_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Disable strict host key checking for Pantheon
          cat >> ~/.ssh/config <<EOF
          Host *.drush.in
              StrictHostKeyChecking no
              UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Switch dev to SFTP mode
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
        run: |
          echo "Switching dev environment to SFTP mode..."
          terminus connection:set "$SITE_NAME.dev" sftp || echo "Already in SFTP mode or switch failed"

      - name: Load manifest and exclusions
        id: load_manifest
        run: |
          SITE_NAME="${{ secrets.PANTHEON_SITE_NAME }}"
          SOURCE_ENV="${{ github.event.inputs.source_env }}"

          echo "site_name=$SITE_NAME" >> $GITHUB_OUTPUT
          echo "source_env=$SOURCE_ENV" >> $GITHUB_OUTPUT

          # Load exclusions
          if [ -f "bin/manifest-exclude.txt" ]; then
            EXCLUDED=$(grep -v '^#' bin/manifest-exclude.txt | grep -v '^[[:space:]]*$' | tr '\n' '|' | sed 's/|$//')
            echo "excluded=$EXCLUDED" >> $GITHUB_OUTPUT
          else
            echo "excluded=" >> $GITHUB_OUTPUT
          fi

          # Initialize tracking files
          touch /tmp/changes_made.txt
          touch /tmp/plugins_installed.txt
          touch /tmp/plugins_updated.txt
          touch /tmp/plugins_activated.txt
          touch /tmp/plugins_deactivated.txt
          touch /tmp/themes_installed.txt
          touch /tmp/themes_updated.txt

      - name: Compare current state with manifest
        id: compare
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          SOURCE_ENV: ${{ steps.load_manifest.outputs.source_env }}
          EXCLUDED: ${{ steps.load_manifest.outputs.excluded }}
          FORCE: ${{ github.event.inputs.force_reinstall }}
        run: |
          echo "## 🔍 Comparing Pantheon dev with manifest ($SOURCE_ENV)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Wake dev environment
          terminus env:wake "$SITE_NAME.dev" || true

          # Get target versions from manifest
          WP_TARGET=$(jq -r ".environments.$SOURCE_ENV.wordpress.version // \"unknown\"" bin/manifest.json)
          THEME_TARGET=$(jq -r ".environments.$SOURCE_ENV.active_theme // \"unknown\"" bin/manifest.json)

          # Get current versions from Pantheon dev
          WP_CURRENT=$(terminus wp "$SITE_NAME.dev" -- core version 2>/dev/null | grep -v "^\[" | grep -E "^[0-9]" || echo "unknown")
          THEME_CURRENT=$(terminus wp "$SITE_NAME.dev" -- theme list --status=active --field=name 2>/dev/null | grep -v "^\[" | head -1 || echo "unknown")

          echo "wp_target=$WP_TARGET" >> $GITHUB_OUTPUT
          echo "wp_current=$WP_CURRENT" >> $GITHUB_OUTPUT
          echo "theme_target=$THEME_TARGET" >> $GITHUB_OUTPUT
          echo "theme_current=$THEME_CURRENT" >> $GITHUB_OUTPUT

          # Determine if WP core needs update
          if [ "$FORCE" = "true" ] || [ "$WP_CURRENT" != "$WP_TARGET" ]; then
            echo "wp_action=update" >> $GITHUB_OUTPUT
          else
            echo "wp_action=skip" >> $GITHUB_OUTPUT
          fi

          # Get plugins from manifest and current state
          jq -r ".environments.$SOURCE_ENV.plugins | to_entries[] | \"\(.key)|\(.value.version)|\(.value.status)\"" bin/manifest.json > /tmp/manifest_plugins.txt
          terminus wp "$SITE_NAME.dev" -- plugin list --format=json 2>/dev/null | \
            grep -v "^\[" | grep "^\[" | \
            jq -r '.[] | "\(.name)|\(.version)|\(.status)"' > /tmp/current_plugins.txt || echo "" > /tmp/current_plugins.txt

          # Compare and build action lists
          > /tmp/plugins_to_install.txt
          > /tmp/plugins_to_update.txt
          > /tmp/plugins_to_activate.txt
          > /tmp/plugins_to_deactivate.txt

          while IFS='|' read -r slug version status; do
            # Skip excluded plugins
            if echo "$EXCLUDED" | grep -qE "(^|\\|)${slug}(\\||$)"; then
              continue
            fi

            current_line=$(grep "^${slug}|" /tmp/current_plugins.txt || echo "")

            if [ -z "$current_line" ]; then
              # Plugin not installed
              echo "${slug}|${version}|${status}" >> /tmp/plugins_to_install.txt
            else
              current_version=$(echo "$current_line" | cut -d'|' -f2)
              current_status=$(echo "$current_line" | cut -d'|' -f3)

              if [ "$FORCE" = "true" ] || [ "$current_version" != "$version" ]; then
                echo "${slug}|${version}|${status}" >> /tmp/plugins_to_update.txt
              elif [ "$status" = "active" ] && [ "$current_status" != "active" ]; then
                echo "$slug" >> /tmp/plugins_to_activate.txt
              elif [ "$status" = "inactive" ] && [ "$current_status" = "active" ]; then
                echo "$slug" >> /tmp/plugins_to_deactivate.txt
              fi
            fi
          done < /tmp/manifest_plugins.txt

          # Get themes from manifest and current state
          jq -r ".environments.$SOURCE_ENV.themes | to_entries[] | \"\(.key)|\(.value.version)\"" bin/manifest.json > /tmp/manifest_themes.txt || echo "" > /tmp/manifest_themes.txt
          terminus wp "$SITE_NAME.dev" -- theme list --format=json 2>/dev/null | \
            grep -v "^\[" | grep "^\[" | \
            jq -r '.[] | "\(.name)|\(.version)"' > /tmp/current_themes.txt || echo "" > /tmp/current_themes.txt

          # Compare themes
          > /tmp/themes_to_install.txt
          > /tmp/themes_to_update.txt

          while IFS='|' read -r slug version; do
            # Skip excluded themes
            if echo "$EXCLUDED" | grep -qE "(^|\\|)${slug}(\\||$)"; then
              continue
            fi

            current_line=$(grep "^${slug}|" /tmp/current_themes.txt || echo "")

            if [ -z "$current_line" ]; then
              # Theme not installed
              echo "${slug}|${version}" >> /tmp/themes_to_install.txt
            else
              current_version=$(echo "$current_line" | cut -d'|' -f2)

              if [ "$FORCE" = "true" ] || [ "$current_version" != "$version" ]; then
                echo "${slug}|${version}|${current_version}" >> /tmp/themes_to_update.txt
              fi
            fi
          done < /tmp/manifest_themes.txt

          # Count actions
          INSTALL_COUNT=$(wc -l < /tmp/plugins_to_install.txt | xargs)
          UPDATE_COUNT=$(wc -l < /tmp/plugins_to_update.txt | xargs)
          ACTIVATE_COUNT=$(wc -l < /tmp/plugins_to_activate.txt | xargs)
          DEACTIVATE_COUNT=$(wc -l < /tmp/plugins_to_deactivate.txt | xargs)
          THEME_INSTALL_COUNT=$(wc -l < /tmp/themes_to_install.txt | xargs)
          THEME_UPDATE_COUNT=$(wc -l < /tmp/themes_to_update.txt | xargs)

          echo "plugins_install_count=$INSTALL_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_update_count=$UPDATE_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_activate_count=$ACTIVATE_COUNT" >> $GITHUB_OUTPUT
          echo "plugins_deactivate_count=$DEACTIVATE_COUNT" >> $GITHUB_OUTPUT
          echo "themes_install_count=$THEME_INSTALL_COUNT" >> $GITHUB_OUTPUT
          echo "themes_update_count=$THEME_UPDATE_COUNT" >> $GITHUB_OUTPUT

          # Calculate total actions
          TOTAL_ACTIONS=0
          [ "$WP_CURRENT" != "$WP_TARGET" ] && TOTAL_ACTIONS=$((TOTAL_ACTIONS + 1))
          TOTAL_ACTIONS=$((TOTAL_ACTIONS + INSTALL_COUNT + UPDATE_COUNT + ACTIVATE_COUNT + DEACTIVATE_COUNT + THEME_INSTALL_COUNT + THEME_UPDATE_COUNT))

          echo "total_actions=$TOTAL_ACTIONS" >> $GITHUB_OUTPUT

          # Write summary
          echo "**Source:** $SOURCE_ENV environment from manifest" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $([ "$FORCE" = "true" ] && echo "Force reinstall (slow)" || echo "Smart sync (fast)")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### WordPress Core" >> $GITHUB_STEP_SUMMARY
          if [ "$WP_CURRENT" != "$WP_TARGET" ]; then
            echo "- 🔄 **Version mismatch**: $WP_CURRENT → $WP_TARGET (will update)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ Up to date: $WP_TARGET" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Plugins" >> $GITHUB_STEP_SUMMARY
          echo "- Install: $INSTALL_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Update (version mismatch): $UPDATE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Activate: $ACTIVATE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Deactivate: $DEACTIVATE_COUNT" >> $GITHUB_STEP_SUMMARY

          # Show detailed version mismatches for plugins
          if [ "$UPDATE_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Plugin version mismatches (will be updated):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version status; do
              [ -z "$slug" ] && continue
              current_line=$(grep "^${slug}|" /tmp/current_plugins.txt || echo "")
              if [ -n "$current_line" ]; then
                current_version=$(echo "$current_line" | cut -d'|' -f2)
                echo "- \`$slug\`: $current_version → **$version**" >> $GITHUB_STEP_SUMMARY
              fi
            done < /tmp/plugins_to_update.txt
          fi

          if [ "$INSTALL_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Plugins to install (not currently installed):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version status; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: **$version** (new)" >> $GITHUB_STEP_SUMMARY
            done < /tmp/plugins_to_install.txt
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Themes" >> $GITHUB_STEP_SUMMARY
          echo "- Install: $THEME_INSTALL_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Update (version mismatch): $THEME_UPDATE_COUNT" >> $GITHUB_STEP_SUMMARY

          # Show detailed version mismatches for themes
          if [ "$THEME_UPDATE_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Theme version mismatches (will be updated):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version current_version; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: $current_version → **$version**" >> $GITHUB_STEP_SUMMARY
            done < /tmp/themes_to_update.txt
          fi

          if [ "$THEME_INSTALL_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Themes to install (not currently installed):**" >> $GITHUB_STEP_SUMMARY
            while IFS='|' read -r slug version; do
              [ -z "$slug" ] && continue
              echo "- \`$slug\`: **$version** (new)" >> $GITHUB_STEP_SUMMARY
            done < /tmp/themes_to_install.txt
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$THEME_CURRENT" != "$THEME_TARGET" ]; then
            echo "**Active theme change**: $THEME_CURRENT → **$THEME_TARGET** (will activate)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Active theme**: ✅ $THEME_TARGET (no change)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Total actions needed:** $TOTAL_ACTIONS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Update WordPress Core
        if: steps.compare.outputs.wp_action == 'update'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          WP_TARGET: ${{ steps.compare.outputs.wp_target }}
          WP_CURRENT: ${{ steps.compare.outputs.wp_current }}
        run: |
          echo "Updating WordPress from $WP_CURRENT to $WP_TARGET..."

          if terminus wp "$SITE_NAME.dev" -- core update --version="$WP_TARGET" || \
             terminus wp "$SITE_NAME.dev" -- core download --version="$WP_TARGET" --force; then
            echo "✅ WordPress updated: $WP_CURRENT → $WP_TARGET"
            echo "WordPress: $WP_CURRENT → $WP_TARGET" > /tmp/changes_made.txt
          else
            echo "❌ WordPress update failed"
            touch /tmp/changes_made.txt
          fi

      - name: Install new plugins
        if: steps.compare.outputs.plugins_install_count > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Installing ${{ steps.compare.outputs.plugins_install_count }} plugins..."
          > /tmp/plugins_installed.txt
          while IFS='|' read -r slug version status; do
            [ -z "$slug" ] && continue
            echo "  Installing ${slug} ${version}..."
            if terminus wp "$SITE_NAME.dev" -- plugin install "$slug" --version="$version"; then
              echo "$slug $version" >> /tmp/plugins_installed.txt
              [ "$status" = "active" ] && terminus wp "$SITE_NAME.dev" -- plugin activate "$slug" 2>/dev/null || true
              echo "  ✅ Installed: $slug $version"
            else
              echo "  ❌ Failed to install $slug"
            fi
          done < /tmp/plugins_to_install.txt

      - name: Update existing plugins
        if: steps.compare.outputs.plugins_update_count > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Updating ${{ steps.compare.outputs.plugins_update_count }} plugins..."
          > /tmp/plugins_updated.txt
          while IFS='|' read -r slug version status; do
            [ -z "$slug" ] && continue

            # Get current version for logging
            current_version=$(grep "^${slug}|" /tmp/current_plugins.txt | cut -d'|' -f2 || echo "unknown")

            echo "  Updating ${slug}: ${current_version} → ${version}..."
            if terminus wp "$SITE_NAME.dev" -- plugin update "$slug" --version="$version" || \
               terminus wp "$SITE_NAME.dev" -- plugin install "$slug" --version="$version" --force; then
              echo "$slug: $current_version → $version" >> /tmp/plugins_updated.txt
              [ "$status" = "active" ] && terminus wp "$SITE_NAME.dev" -- plugin activate "$slug" 2>/dev/null || true
              [ "$status" = "inactive" ] && terminus wp "$SITE_NAME.dev" -- plugin deactivate "$slug" 2>/dev/null || true
              echo "  ✅ Updated: $slug $current_version → $version"
            else
              echo "  ❌ Failed to update $slug"
            fi
          done < /tmp/plugins_to_update.txt

      - name: Activate plugins
        if: steps.compare.outputs.plugins_activate_count > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Activating ${{ steps.compare.outputs.plugins_activate_count }} plugins..."
          > /tmp/plugins_activated.txt
          while read -r slug; do
            [ -z "$slug" ] && continue
            if terminus wp "$SITE_NAME.dev" -- plugin activate "$slug"; then
              echo "$slug" >> /tmp/plugins_activated.txt
              echo "  ✅ Activated: $slug"
            else
              echo "  ❌ Failed to activate $slug"
            fi
          done < /tmp/plugins_to_activate.txt

      - name: Deactivate plugins
        if: steps.compare.outputs.plugins_deactivate_count > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Deactivating ${{ steps.compare.outputs.plugins_deactivate_count }} plugins..."
          > /tmp/plugins_deactivated.txt
          while read -r slug; do
            [ -z "$slug" ] && continue
            if terminus wp "$SITE_NAME.dev" -- plugin deactivate "$slug"; then
              echo "$slug" >> /tmp/plugins_deactivated.txt
              echo "  ✅ Deactivated: $slug"
            else
              echo "  ❌ Failed to deactivate $slug"
            fi
          done < /tmp/plugins_to_deactivate.txt

      - name: Install new themes
        if: steps.compare.outputs.themes_install_count > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Installing ${{ steps.compare.outputs.themes_install_count }} themes..."
          > /tmp/themes_installed.txt
          while IFS='|' read -r slug version; do
            [ -z "$slug" ] && continue
            echo "  Installing ${slug} ${version}..."
            if terminus wp "$SITE_NAME.dev" -- theme install "$slug" --version="$version"; then
              echo "$slug $version" >> /tmp/themes_installed.txt
              echo "  ✅ Installed: $slug $version"
            else
              echo "  ❌ Failed to install $slug"
            fi
          done < /tmp/themes_to_install.txt

      - name: Update existing themes
        if: steps.compare.outputs.themes_update_count > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Updating ${{ steps.compare.outputs.themes_update_count }} themes..."
          > /tmp/themes_updated.txt
          while IFS='|' read -r slug version current_version; do
            [ -z "$slug" ] && continue
            echo "  Updating ${slug}: ${current_version} → ${version}..."
            if terminus wp "$SITE_NAME.dev" -- theme update "$slug" --version="$version" || \
               terminus wp "$SITE_NAME.dev" -- theme install "$slug" --version="$version" --force; then
              echo "$slug: $current_version → $version" >> /tmp/themes_updated.txt
              echo "  ✅ Updated: $slug $current_version → $version"
            else
              echo "  ❌ Failed to update $slug"
            fi
          done < /tmp/themes_to_update.txt

      - name: Activate theme
        if: steps.compare.outputs.theme_current != steps.compare.outputs.theme_target
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          THEME_TARGET: ${{ steps.compare.outputs.theme_target }}
        run: |
          echo "Activating theme: $THEME_TARGET"
          terminus wp "$SITE_NAME.dev" -- theme activate "$THEME_TARGET" || echo "⚠️ Could not activate theme"

      - name: Commit changes to Pantheon dev
        if: github.event.inputs.commit_changes == 'true' && steps.compare.outputs.total_actions > 0
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
          SOURCE_ENV: ${{ steps.load_manifest.outputs.source_env }}
        run: |
          echo "Building commit message with changes..."

          # Build detailed commit message
          cat > /tmp/commit_message.txt <<EOF
          Sync from manifest ($SOURCE_ENV) via GitHub Actions

          EOF

          # Add WordPress core changes
          if [ -f /tmp/changes_made.txt ]; then
            cat /tmp/changes_made.txt >> /tmp/commit_message.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin installations
          if [ -f /tmp/plugins_installed.txt ] && [ -s /tmp/plugins_installed.txt ]; then
            echo "Plugins installed:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_installed.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin updates
          if [ -f /tmp/plugins_updated.txt ] && [ -s /tmp/plugins_updated.txt ]; then
            echo "Plugins updated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_updated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add theme installations
          if [ -f /tmp/themes_installed.txt ] && [ -s /tmp/themes_installed.txt ]; then
            echo "Themes installed:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/themes_installed.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add theme updates
          if [ -f /tmp/themes_updated.txt ] && [ -s /tmp/themes_updated.txt ]; then
            echo "Themes updated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/themes_updated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin activations
          if [ -f /tmp/plugins_activated.txt ] && [ -s /tmp/plugins_activated.txt ]; then
            echo "Plugins activated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_activated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Add plugin deactivations
          if [ -f /tmp/plugins_deactivated.txt ] && [ -s /tmp/plugins_deactivated.txt ]; then
            echo "Plugins deactivated:" >> /tmp/commit_message.txt
            while read line; do
              echo "  - $line" >> /tmp/commit_message.txt
            done < /tmp/plugins_deactivated.txt
            echo "" >> /tmp/commit_message.txt
          fi

          # Show commit message
          echo "Commit message:"
          cat /tmp/commit_message.txt

          # Commit with detailed message
          terminus env:commit "$SITE_NAME.dev" --message="$(cat /tmp/commit_message.txt)" || echo "⚠️ No changes to commit or commit failed"

      - name: Switch dev back to Git mode
        if: always()
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Switching dev environment back to Git mode..."
          terminus connection:set "$SITE_NAME.dev" git || echo "⚠️ Could not switch to Git mode"

      - name: Clear cache
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          terminus env:clear-cache "$SITE_NAME.dev"

      - name: Deploy to test
        if: github.event.inputs.deploy_to_test == 'true'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Deploying to test environment..."
          terminus env:deploy "$SITE_NAME.test" --sync-content --note="Deployed from manifest sync via GitHub Actions" || echo "⚠️ Deploy to test failed"
          terminus env:clear-cache "$SITE_NAME.test"

      - name: Deploy to live
        if: github.event.inputs.deploy_to_live == 'true' && github.event.inputs.deploy_to_test == 'true'
        env:
          SITE_NAME: ${{ steps.load_manifest.outputs.site_name }}
        run: |
          echo "Deploying to live environment..."
          terminus env:deploy "$SITE_NAME.live" --note="Deployed from manifest sync via GitHub Actions" || echo "⚠️ Deploy to live failed"
          terminus env:clear-cache "$SITE_NAME.live"

      - name: Final summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count successful changes
          WP_CHANGED=0
          PLUGINS_INSTALLED=0
          PLUGINS_UPDATED=0
          PLUGINS_ACTIVATED=0
          PLUGINS_DEACTIVATED=0
          THEMES_INSTALLED=0
          THEMES_UPDATED=0

          [ -f /tmp/changes_made.txt ] && [ -s /tmp/changes_made.txt ] && WP_CHANGED=1
          [ -f /tmp/plugins_installed.txt ] && PLUGINS_INSTALLED=$(wc -l < /tmp/plugins_installed.txt | xargs)
          [ -f /tmp/plugins_updated.txt ] && PLUGINS_UPDATED=$(wc -l < /tmp/plugins_updated.txt | xargs)
          [ -f /tmp/plugins_activated.txt ] && PLUGINS_ACTIVATED=$(wc -l < /tmp/plugins_activated.txt | xargs)
          [ -f /tmp/plugins_deactivated.txt ] && PLUGINS_DEACTIVATED=$(wc -l < /tmp/plugins_deactivated.txt | xargs)
          [ -f /tmp/themes_installed.txt ] && THEMES_INSTALLED=$(wc -l < /tmp/themes_installed.txt | xargs)
          [ -f /tmp/themes_updated.txt ] && THEMES_UPDATED=$(wc -l < /tmp/themes_updated.txt | xargs)

          TOTAL_CHANGES=$((WP_CHANGED + PLUGINS_INSTALLED + PLUGINS_UPDATED + PLUGINS_ACTIVATED + PLUGINS_DEACTIVATED + THEMES_INSTALLED + THEMES_UPDATED))

          echo "**Actions planned:** ${{ steps.compare.outputs.total_actions }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes applied:** $TOTAL_CHANGES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Show what was actually changed
          if [ "$TOTAL_CHANGES" -gt 0 ]; then
            echo "### 🔄 Changes Applied" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # WordPress Core
            if [ -f /tmp/changes_made.txt ] && [ -s /tmp/changes_made.txt ]; then
              echo "**WordPress Core:**" >> $GITHUB_STEP_SUMMARY
              cat /tmp/changes_made.txt | sed 's/^/- ✅ /' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins installed
            if [ "$PLUGINS_INSTALLED" -gt 0 ]; then
              echo "**Plugins Installed ($PLUGINS_INSTALLED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_installed.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins updated
            if [ "$PLUGINS_UPDATED" -gt 0 ]; then
              echo "**Plugins Updated ($PLUGINS_UPDATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_updated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Themes installed
            if [ "$THEMES_INSTALLED" -gt 0 ]; then
              echo "**Themes Installed ($THEMES_INSTALLED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/themes_installed.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Themes updated
            if [ "$THEMES_UPDATED" -gt 0 ]; then
              echo "**Themes Updated ($THEMES_UPDATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/themes_updated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins activated
            if [ "$PLUGINS_ACTIVATED" -gt 0 ]; then
              echo "**Plugins Activated ($PLUGINS_ACTIVATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_activated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            # Plugins deactivated
            if [ "$PLUGINS_DEACTIVATED" -gt 0 ]; then
              echo "**Plugins Deactivated ($PLUGINS_DEACTIVATED):**" >> $GITHUB_STEP_SUMMARY
              while read line; do
                echo "- ✅ $line" >> $GITHUB_STEP_SUMMARY
              done < /tmp/plugins_deactivated.txt
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️ **No changes applied** - Either everything was already up to date or all updates failed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Committed to dev:** ${{ github.event.inputs.commit_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to test:** ${{ github.event.inputs.deploy_to_test }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to live:** ${{ github.event.inputs.deploy_to_live }}" >> $GITHUB_STEP_SUMMARY
