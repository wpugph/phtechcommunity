name: Sync Manifest from Pantheon

on:
  workflow_dispatch:
    inputs:
      environments:
        description: 'Environments to sync (comma-separated: dev,test,live or "all")'
        required: false
        default: 'all'
        type: string
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Terminus
        id: cache-terminus
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/terminus
          key: terminus-3.5.0

      - name: Install dependencies
        run: |
          # Install Terminus (use cached if available)
          if [ ! -f /usr/local/bin/terminus ]; then
            echo "Installing Terminus..."
            mkdir -p $HOME/.terminus
            curl -L https://github.com/pantheon-systems/terminus/releases/download/3.5.0/terminus.phar -o /usr/local/bin/terminus
            chmod +x /usr/local/bin/terminus
          else
            echo "Using cached Terminus"
            chmod +x /usr/local/bin/terminus
          fi

          # Install jq (fast, no need to cache)
          sudo apt-get update -qq && sudo apt-get install -y -qq jq >/dev/null 2>&1

      - name: Authenticate with Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$TERMINUS_TOKEN"

      - name: Sync manifest from Pantheon
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          SYNC_ENVS: ${{ github.event.inputs.environments || 'all' }}
        run: |
          echo "🔄 Syncing manifest from Pantheon..."

          # Get site UUID
          SITE_UUID=$(terminus site:info "$SITE_NAME" --field=id)

          # Function to get environment data
          get_env_data() {
            local ENV=$1
            echo "→ Fetching $ENV environment..." >&2

            # Wake environment
            terminus env:wake "$SITE_NAME.$ENV" &> /dev/null || true
            sleep 2

            # Get WordPress version
            WP_VERSION=$(terminus wp "$SITE_NAME.$ENV" -- core version 2>&1 | grep -oE "^[0-9]+\.[0-9]+(\.[0-9]+)?" | head -1 || echo "unknown")

            # Get PHP version
            PHP_VERSION=$(terminus env:info "$SITE_NAME.$ENV" --field=php_version 2>/dev/null || echo "unknown")

            # Get plugins (capture JSON, filter non-JSON lines)
            PLUGINS_RAW=$(terminus wp "$SITE_NAME.$ENV" -- plugin list --format=json 2>&1)
            PLUGINS_JSON=$(echo "$PLUGINS_RAW" | grep -E '^\[' | head -1 || echo "[]")

            # Debug: show plugin count
            PLUGIN_COUNT=$(echo "$PLUGINS_JSON" | jq 'length' 2>/dev/null || echo "0")
            echo "  Plugins found: $PLUGIN_COUNT" >&2

            # Get themes (capture JSON, filter non-JSON lines)
            THEMES_RAW=$(terminus wp "$SITE_NAME.$ENV" -- theme list --format=json 2>&1)
            THEMES_JSON=$(echo "$THEMES_RAW" | grep -E '^\[' | head -1 || echo "[]")

            # Debug: show theme count
            THEME_COUNT=$(echo "$THEMES_JSON" | jq 'length' 2>/dev/null || echo "0")
            echo "  Themes found: $THEME_COUNT" >&2

            # Get active theme
            ACTIVE_THEME=$(terminus wp "$SITE_NAME.$ENV" -- theme list --status=active --field=name 2>&1 | grep -v "^\[" | grep -v "^Command:" | head -1 || echo "unknown")

            # Get multisite status
            IS_MULTISITE=$(terminus wp "$SITE_NAME.$ENV" -- eval 'echo is_multisite() ? "true" : "false";' 2>&1 | grep -E "^(true|false)" || echo "false")

            # Build JSON
            cat <<ENVEOF
          {
            "site_name": "$SITE_NAME",
            "site_id": "$SITE_UUID",
            "environment": "$ENV",
            "wordpress": {
              "version": "$WP_VERSION",
              "db_version": "unknown"
            },
            "php_version": "$PHP_VERSION",
            "plugins": $(echo "$PLUGINS_JSON" | jq 'map({(.name): {version: .version, status: .status, update: .update, update_version: .update_version}}) | add // {}' 2>/dev/null || echo "{}"),
            "themes": $(echo "$THEMES_JSON" | jq 'map({(.name): {version: .version, status: .status, update: .update}}) | add // {}' 2>/dev/null || echo "{}"),
            "mu_plugins": {},
            "active_theme": "$ACTIVE_THEME",
            "multisite": $IS_MULTISITE,
            "last_updated": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          ENVEOF
          }

          # Determine which environments to sync
          if [ "$SYNC_ENVS" = "all" ]; then
            ENVS_TO_SYNC="dev test live"
          else
            ENVS_TO_SYNC=$(echo "$SYNC_ENVS" | tr ',' ' ')
          fi

          echo ""
          echo "📋 Environments to sync: $ENVS_TO_SYNC"
          echo ""

          # Sync each environment to its own file
          for ENV in $ENVS_TO_SYNC; do
            if [ "$ENV" = "dev" ] || [ "$ENV" = "test" ] || [ "$ENV" = "live" ]; then
              echo "→ Syncing $ENV to manifest.$ENV.json..." >&2
              ENV_DATA=$(get_env_data "$ENV")
              echo "$ENV_DATA" | jq '.' > "bin/manifest.$ENV.json"
              echo "  ✅ Saved bin/manifest.$ENV.json" >&2
            fi
          done

          # Get multidevs (only if syncing "all")
          if [ "$SYNC_ENVS" = "all" ]; then
            echo "→ Checking for multidev environments..." >&2
            MULTIDEVS=$(terminus multidev:list "$SITE_NAME" --format=json 2>/dev/null || echo "[]")
            MULTIDEV_COUNT=$(echo "$MULTIDEVS" | jq 'length')

            if [ "$MULTIDEV_COUNT" -gt 0 ]; then
              echo "  Found $MULTIDEV_COUNT multidev(s)" >&2
              echo "$MULTIDEVS" | jq -r '.[].id' | while read -r MULTIDEV_NAME; do
                echo "  → Syncing $MULTIDEV_NAME to manifest.$MULTIDEV_NAME.json..." >&2
                MULTIDEV_DATA=$(get_env_data "$MULTIDEV_NAME")
                echo "$MULTIDEV_DATA" | jq '.' > "bin/manifest.$MULTIDEV_NAME.json"
                echo "    ✅ Saved bin/manifest.$MULTIDEV_NAME.json" >&2
              done
            else
              echo "  No multidev environments found" >&2
            fi
          else
            echo "  Skipping multidev environments (not included in sync)" >&2
          fi

          echo "✅ Manifests synced successfully!" >&2

      - name: Check for changes
        id: check_changes
        run: |
          # Add all manifest files (including new ones)
          git add bin/manifest.*.json 2>/dev/null || true

          # Check if there are any changes (modified or new files)
          if git diff --cached --quiet bin/manifest.*.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected in manifests"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✨ Changes detected in manifests"

            # Show which files changed
            echo "Changed files:"
            git diff --cached --name-only bin/manifest.*.json | sed 's/^/  - /'
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          # Files already staged in check step, create commit message
          CHANGED_FILES=$(git diff --cached --name-only bin/manifest.*.json | xargs -n1 basename)

          cat > /tmp/commit-msg.txt <<EOF
          Update manifests from Pantheon

          Synced environments: ${{ github.event.inputs.environments || 'all' }}

          Updated files:
          $(echo "$CHANGED_FILES" | sed 's/^/  - /')

          🤖 Auto-synced by GitHub Actions
          EOF

          git commit -F /tmp/commit-msg.txt

          # Pull with rebase to avoid conflicts
          git pull --rebase origin ${{ github.ref_name }} || {
            echo "⚠️ Pull failed, attempting to continue..."
          }

          git push
          echo "✅ Changes committed and pushed to repository"

      - name: Summary
        run: |
          echo "## 📊 Manifest Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Site:** ${{ secrets.PANTHEON_SITE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environments:** ${{ github.event.inputs.environments || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ **Manifest updated and committed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️  **No changes detected**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for manifest_file in bin/manifest.*.json; do
            if [ -f "$manifest_file" ]; then
              env_name=$(basename "$manifest_file" .json | sed 's/manifest\.//')
              wp_version=$(jq -r '.wordpress.version // "unknown"' "$manifest_file")
              echo "- **$env_name**: $wp_version" >> $GITHUB_STEP_SUMMARY
            fi
          done
