name: Sync Manifest from Pantheon

# Syncs WordPress manifest files from Pantheon environments
on:
  workflow_dispatch:
    inputs:
      environments:
        description: 'Environments to sync (comma-separated: dev,test,live or "all")'
        required: false
        default: 'all'
        type: string
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Terminus
        id: cache-terminus
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/terminus
          key: terminus-3.5.0

      - name: Install dependencies
        run: |
          # Install Terminus (use cached if available)
          if [ ! -f /usr/local/bin/terminus ]; then
            echo "Installing Terminus..."
            mkdir -p $HOME/.terminus
            curl -L https://github.com/pantheon-systems/terminus/releases/download/3.5.0/terminus.phar -o /usr/local/bin/terminus
            chmod +x /usr/local/bin/terminus
          else
            echo "Using cached Terminus"
            chmod +x /usr/local/bin/terminus
          fi

          # Install jq (fast, no need to cache)
          sudo apt-get update -qq && sudo apt-get install -y -qq jq >/dev/null 2>&1

      - name: Authenticate with Pantheon
        env:
          TERMINUS_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$TERMINUS_TOKEN"

      - name: Sync manifest from Pantheon
        env:
          SITE_NAME: ${{ secrets.PANTHEON_SITE_NAME }}
          SYNC_ENVS: ${{ github.event.inputs.environments || 'all' }}
        run: |
          echo "🔄 Syncing manifest from Pantheon..."

          # Verify site exists and get UUID
          echo "Verifying site access..."
          if ! SITE_UUID=$(terminus site:info "$SITE_NAME" --field=id 2>&1); then
            echo "❌ ERROR: Cannot access site '$SITE_NAME'"
            echo "Terminus output:"
            terminus site:info "$SITE_NAME" 2>&1 | head -10
            exit 1
          fi
          echo "✓ Site UUID: $SITE_UUID"

          # Function to get environment data
          get_env_data() {
            local ENV=$1
            echo "→ Fetching $ENV environment..." >&2

            # Wake environment
            echo "  Waking environment..." >&2
            terminus env:wake "$SITE_NAME.$ENV" 2>&1 | head -1
            sleep 5

            # Check connection mode and switch to SFTP if needed (WP-CLI requires SFTP mode)
            echo "  Checking connection mode..." >&2
            CONN_MODE_OUTPUT=$(terminus connection:info "$SITE_NAME.$ENV" --field=mode 2>&1)
            CONN_MODE=$(echo "$CONN_MODE_OUTPUT" | head -1 | tr -d '[:space:]')

            if [ -z "$CONN_MODE" ] || [ "$CONN_MODE" = "" ]; then
              echo "  Warning: Could not determine connection mode" >&2
              echo "  Terminus output: $CONN_MODE_OUTPUT" >&2
              CONN_MODE="unknown"
            fi

            echo "  Current mode: $CONN_MODE" >&2

            if [ "$CONN_MODE" = "git" ]; then
              echo "  Switching to SFTP mode (required for WP-CLI)..." >&2
              terminus connection:set "$SITE_NAME.$ENV" sftp 2>&1 | head -1
              sleep 3
            elif [ "$CONN_MODE" = "unknown" ]; then
              echo "  Attempting to set SFTP mode anyway..." >&2
              terminus connection:set "$SITE_NAME.$ENV" sftp 2>&1 | head -3
              sleep 3
            fi

            # Test WP-CLI connectivity with retry
            echo "  Testing WP-CLI connectivity..." >&2
            echo "  Command: terminus wp $SITE_NAME.$ENV -- core version" >&2
            WP_CLI_READY=false
            for i in {1..3}; do
              echo "    Attempt $i/3..." >&2
              if terminus wp "$SITE_NAME.$ENV" -- core version --quiet 2>/dev/null; then
                WP_CLI_READY=true
                echo "    ✓ Success!" >&2
                break
              fi
              if [ $i -lt 3 ]; then
                echo "    Failed, waiting 5s..." >&2
                sleep 5
              fi
            done

            if [ "$WP_CLI_READY" = "false" ]; then
              echo "  ❌ ERROR: Cannot connect to WordPress via WP-CLI after 3 attempts" >&2
              echo "" >&2
              echo "  Diagnostics:" >&2

              echo "    Checking if environment exists..." >&2
              if terminus env:list "$SITE_NAME" --format=list 2>/dev/null | grep -q "^$ENV$"; then
                echo "      ✓ Environment '$ENV' exists" >&2
              else
                echo "      ✗ Environment '$ENV' NOT found!" >&2
                echo "      Available environments:" >&2
                terminus env:list "$SITE_NAME" --format=list 2>&1 | sed 's/^/        /'
              fi
              echo "" >&2

              echo "    Environment info:" >&2
              terminus env:info "$SITE_NAME.$ENV" 2>&1 | head -10 | sed 's/^/      /'
              echo "" >&2

              echo "    Last WP-CLI error (full output):" >&2
              WP_ERROR=$(terminus wp "$SITE_NAME.$ENV" -- core version 2>&1)
              if [ -z "$WP_ERROR" ]; then
                echo "      (no output from terminus - command timed out or failed silently)" >&2
              else
                echo "$WP_ERROR" | sed 's/^/      /'
              fi
              echo "" >&2
              echo "  Returning minimal data for $ENV" >&2
              # Use reusable script for JSON generation
              bin/generate-manifest-json.sh --error "$SITE_NAME" "$SITE_UUID" "$ENV"
              return 0
            fi
            echo "  ✓ WP-CLI connected" >&2

            # Get WordPress version
            WP_VERSION=$(terminus wp "$SITE_NAME.$ENV" -- core version 2>&1 | grep -oE "^[0-9]+\.[0-9]+(\.[0-9]+)?" | head -1 || echo "unknown")

            # Get PHP version
            PHP_VERSION=$(terminus env:info "$SITE_NAME.$ENV" --field=php_version 2>/dev/null || echo "unknown")

            # Get plugins (robust JSON extraction)
            PLUGINS_RAW=$(terminus wp "$SITE_NAME.$ENV" -- plugin list --format=json 2>&1)

            # Try to extract valid JSON - look for array anywhere in output
            if echo "$PLUGINS_RAW" | jq -e '.' >/dev/null 2>&1; then
              # Valid JSON found
              PLUGINS_JSON=$(echo "$PLUGINS_RAW" | jq -c '.')
            elif echo "$PLUGINS_RAW" | grep -q '^\['; then
              # Found array at start of line
              PLUGINS_JSON=$(echo "$PLUGINS_RAW" | grep '^[[]' | head -1)
            else
              # No valid JSON, show error and use empty
              echo "  ⚠️  Could not parse plugins JSON" >&2
              echo "  Raw output (first 200 chars): ${PLUGINS_RAW:0:200}" >&2
              PLUGINS_JSON="[]"
            fi

            # Debug: show plugin count
            PLUGIN_COUNT=$(echo "$PLUGINS_JSON" | jq -e 'length' 2>/dev/null || echo "0")
            echo "  Plugins found: $PLUGIN_COUNT" >&2

            # Get themes (robust JSON extraction)
            THEMES_RAW=$(terminus wp "$SITE_NAME.$ENV" -- theme list --format=json 2>&1)

            # Try to extract valid JSON
            if echo "$THEMES_RAW" | jq -e '.' >/dev/null 2>&1; then
              THEMES_JSON=$(echo "$THEMES_RAW" | jq -c '.')
            elif echo "$THEMES_RAW" | grep -q '^\['; then
              THEMES_JSON=$(echo "$THEMES_RAW" | grep '^[[]' | head -1)
            else
              echo "  ⚠️  Could not parse themes JSON" >&2
              echo "  Raw output (first 200 chars): ${THEMES_RAW:0:200}" >&2
              THEMES_JSON="[]"
            fi

            # Debug: show theme count
            THEME_COUNT=$(echo "$THEMES_JSON" | jq -e 'length' 2>/dev/null || echo "0")
            echo "  Themes found: $THEME_COUNT" >&2

            # Get active theme
            ACTIVE_THEME=$(terminus wp "$SITE_NAME.$ENV" -- theme list --status=active --field=name 2>&1 | grep -v "^\[" | grep -v "^Command:" | head -1 || echo "unknown")

            # Get multisite status
            IS_MULTISITE=$(terminus wp "$SITE_NAME.$ENV" -- eval 'echo is_multisite() ? "true" : "false";' 2>&1 | grep -E "^(true|false)" || echo "false")

            # Process plugins JSON to object format (with error handling)
            if [ "$PLUGINS_JSON" = "[]" ] || [ -z "$PLUGINS_JSON" ]; then
              PLUGINS_OBJ="{}"
            else
              PLUGINS_OBJ=$(echo "$PLUGINS_JSON" | jq -c 'map({(.name): {version: .version, status: .status, update: .update, update_version: .update_version}}) | add // {}' 2>/dev/null || echo "{}")
            fi

            # Process themes JSON to object format (with error handling)
            if [ "$THEMES_JSON" = "[]" ] || [ -z "$THEMES_JSON" ]; then
              THEMES_OBJ="{}"
            else
              THEMES_OBJ=$(echo "$THEMES_JSON" | jq -c 'map({(.name): {version: .version, status: .status, update: .update}}) | add // {}' 2>/dev/null || echo "{}")
            fi

            # Build JSON using reusable script
            bin/generate-manifest-json.sh "$SITE_NAME" "$SITE_UUID" "$ENV" "$WP_VERSION" "$PHP_VERSION" "$PLUGINS_OBJ" "$THEMES_OBJ" "$ACTIVE_THEME" "$IS_MULTISITE"
          }

          # Determine which environments to sync
          if [ "$SYNC_ENVS" = "all" ]; then
            ENVS_TO_SYNC="dev test live"
          else
            ENVS_TO_SYNC=$(echo "$SYNC_ENVS" | tr ',' ' ')
          fi

          echo ""
          echo "📋 Environments to sync: $ENVS_TO_SYNC"
          echo ""

          # Sync each environment to its own file
          for ENV in $ENVS_TO_SYNC; do
            if [ "$ENV" = "dev" ] || [ "$ENV" = "test" ] || [ "$ENV" = "live" ]; then
              echo "→ Syncing $ENV to manifest.$ENV.json..." >&2
              ENV_DATA=$(get_env_data "$ENV")
              echo "$ENV_DATA" | jq '.' > "bin/manifest.$ENV.json"
              echo "  ✅ Saved bin/manifest.$ENV.json" >&2
            fi
          done

          # Get multidevs (only if syncing "all")
          if [ "$SYNC_ENVS" = "all" ]; then
            echo "→ Checking for multidev environments..." >&2
            MULTIDEVS=$(terminus multidev:list "$SITE_NAME" --format=json 2>/dev/null || echo "[]")
            MULTIDEV_COUNT=$(echo "$MULTIDEVS" | jq 'length')

            if [ "$MULTIDEV_COUNT" -gt 0 ]; then
              echo "  Found $MULTIDEV_COUNT multidev(s)" >&2
              echo "$MULTIDEVS" | jq -r '.[].id' | while read -r MULTIDEV_NAME; do
                echo "  → Syncing $MULTIDEV_NAME to manifest.$MULTIDEV_NAME.json..." >&2
                MULTIDEV_DATA=$(get_env_data "$MULTIDEV_NAME")
                echo "$MULTIDEV_DATA" | jq '.' > "bin/manifest.$MULTIDEV_NAME.json"
                echo "    ✅ Saved bin/manifest.$MULTIDEV_NAME.json" >&2
              done
            else
              echo "  No multidev environments found" >&2
            fi
          else
            echo "  Skipping multidev environments (not included in sync)" >&2
          fi

          echo "✅ Manifests synced successfully!" >&2

      - name: Check for changes
        id: check_changes
        run: |
          # Add all manifest files (including new ones)
          git add bin/manifest.*.json 2>/dev/null || true

          # Check if there are any changes (modified or new files)
          # Use -- to separate paths from revisions and check bin/ directory
          if git diff --cached --quiet -- bin/ 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes detected in manifests"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✨ Changes detected in manifests"

            # Show which files changed (filter for manifest files)
            echo "Changed files:"
            git diff --cached --name-only -- bin/ | grep 'manifest\.' | sed 's/^/  - /' || echo "  - (no manifest changes)"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Files already staged in check step, create commit message
          CHANGED_FILES=$(git diff --cached --name-only -- bin/ | grep 'manifest\.' | xargs -n1 basename || echo "")

          cat > /tmp/commit-msg.txt <<EOF
          Update manifests from Pantheon

          Synced environments: ${{ github.event.inputs.environments || 'all' }}

          Updated files:
          $(echo "$CHANGED_FILES" | sed 's/^/  - /' || echo "  - bin/manifest files")

          🤖 Auto-synced by GitHub Actions
          EOF

          git commit -F /tmp/commit-msg.txt

          # Pull with rebase to avoid conflicts
          git pull --rebase origin ${{ github.ref_name }} || {
            echo "⚠️ Pull failed, attempting to continue..."
          }

          git push
          echo "✅ Changes committed and pushed to repository"

      - name: Summary
        run: |
          echo "## 📊 Manifest Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Site:** ${{ secrets.PANTHEON_SITE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environments:** ${{ github.event.inputs.environments || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ **Manifest updated and committed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️  **No changes detected**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for manifest_file in bin/manifest.*.json; do
            if [ -f "$manifest_file" ]; then
              env_name=$(basename "$manifest_file" .json | sed 's/manifest\.//')
              wp_version=$(jq -r '.wordpress.version // "unknown"' "$manifest_file")
              echo "- **$env_name**: $wp_version" >> $GITHUB_STEP_SUMMARY
            fi
          done
